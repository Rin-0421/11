<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的 AI 聊天</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f11;
    --surface: #1a1a1f;
    --border: #2a2a32;
    --accent: #a78bfa;
    --accent-dim: #6d51d8;
    --text: #e8e8f0;
    --text-dim: #888899;
    --user-bg: #1e1b2e;
    --ai-bg: #141418;
    --danger: #f87171;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }

  .model-select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
  }

  .model-select:focus { border-color: var(--accent); }

  /* ── API Key setup ── */
  #setup {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .setup-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    max-width: 420px;
    width: 100%;
  }

  .setup-card h2 { font-size: 18px; margin-bottom: 8px; }
  .setup-card p { color: var(--text-dim); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }

  .key-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    font-family: monospace;
    margin-bottom: 12px;
  }

  .key-input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-primary:hover { background: var(--accent-dim); }

  .error-msg {
    color: var(--danger);
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }

  /* ── Chat area ── */
  #chat { flex: 1; display: none; flex-direction: column; overflow: hidden; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 82%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bg);
    border: 1px solid #2e2840;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg.assistant.typing { color: var(--text-dim); font-style: italic; }

  .msg-label {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  /* ── Input area ── */
  .input-area {
    padding: 12px 16px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    max-width: 800px;
    margin: 0 auto;
  }

  #user-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    outline: none;
    resize: none;
    min-height: 42px;
    max-height: 160px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color 0.15s;
  }

  #user-input:focus { border-color: var(--accent); }
  #user-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
  }

  #send-btn:hover { background: var(--accent-dim); }
  #send-btn:active { transform: scale(0.95); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; }

  #send-btn svg { width: 18px; height: 18px; fill: white; }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 8px;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }

  .clear-btn:hover { color: var(--danger); }

  /* ── System prompt ── */
  .sys-toggle {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    padding: 0;
    margin-right: 8px;
  }

  .sys-toggle:hover { color: var(--accent); }

  #sys-area {
    display: none;
    max-width: 800px;
    margin: 0 auto 10px;
  }

  #sys-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    outline: none;
    resize: none;
    height: 60px;
    font-family: inherit;
    line-height: 1.4;
  }

  #sys-input:focus { border-color: var(--accent); }

  .top-controls {
    max-width: 800px;
    margin: 0 auto 6px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dot"></div>
    <h1>我的 AI 聊天</h1>
  </div>
  <select class="model-select" id="model-select">
    <option value="claude-haiku-4-5-20251001">Haiku 4.5（最省）</option>
    <option value="claude-sonnet-4-6" selected>Sonnet 4.6（推薦）</option>
    <option value="claude-opus-4-6">Opus 4.6（最強）</option>
  </select>
</header>

<!-- API Key Setup -->
<div id="setup">
  <div class="setup-card">
    <h2>輸入你的 API 金鑰</h2>
    <p>金鑰只會存在你的瀏覽器裡，不會傳到任何地方。格式為 <code>sk-ant-...</code></p>
    <input class="key-input" type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off">
    <button class="btn-primary" id="save-key-btn">開始使用</button>
    <p class="error-msg" id="key-error">金鑰格式不對，請確認後再試</p>
  </div>
</div>

<!-- Chat -->
<div id="chat">
  <div id="messages"></div>
  <div class="input-area">
    <div class="top-controls">
      <button class="sys-toggle" id="sys-toggle">⚙ 系統提示詞</button>
      <button class="clear-btn" id="clear-btn">清除對話</button>
    </div>
    <div id="sys-area">
      <textarea id="sys-input" placeholder="輸入系統提示詞（可選）…"></textarea>
    </div>
    <div class="input-row">
      <textarea id="user-input" placeholder="輸入訊息…" rows="1"></textarea>
      <button id="send-btn" title="送出">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
    <p class="hint">Enter 送出・Shift+Enter 換行</p>
  </div>
</div>

<script>
  const API_KEY_STORE = 'my_claude_key';
  const setup = document.getElementById('setup');
  const chat = document.getElementById('chat');
  const keyInput = document.getElementById('api-key-input');
  const saveBtn = document.getElementById('save-key-btn');
  const keyError = document.getElementById('key-error');
  const messages = document.getElementById('messages');
  const userInput = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const clearBtn = document.getElementById('clear-btn');
  const modelSelect = document.getElementById('model-select');
  const sysToggle = document.getElementById('sys-toggle');
  const sysArea = document.getElementById('sys-area');
  const sysInput = document.getElementById('sys-input');

  let apiKey = '';
  let history = [];
  let isLoading = false;

  // ── Init ──
  const stored = sessionStorage.getItem(API_KEY_STORE);
  if (stored) { apiKey = stored; showChat(); }

  // ── Key setup ──
  saveBtn.addEventListener('click', () => {
    const val = keyInput.value.trim();
    if (!val.startsWith('sk-ant-')) {
      keyError.style.display = 'block';
      return;
    }
    keyError.style.display = 'none';
    apiKey = val;
    sessionStorage.setItem(API_KEY_STORE, val);
    showChat();
  });

  keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveBtn.click(); });

  function showChat() {
    setup.style.display = 'none';
    chat.style.display = 'flex';
    userInput.focus();
  }

  // ── System prompt toggle ──
  sysToggle.addEventListener('click', () => {
    const open = sysArea.style.display === 'block';
    sysArea.style.display = open ? 'none' : 'block';
    sysToggle.textContent = open ? '⚙ 系統提示詞' : '✕ 收起';
  });

  // ── Clear ──
  clearBtn.addEventListener('click', () => {
    history = [];
    messages.innerHTML = '';
  });

  // ── Auto-resize textarea ──
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
  });

  // ── Send on Enter ──
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  sendBtn.addEventListener('click', send);

  // ── Send ──
  async function send() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    const typingEl = appendMsg('assistant', '正在思考…', true);

    try {
      const body = {
        model: modelSelect.value,
        max_tokens: 1024,
        messages: history,
      };

      const sys = sysInput.value.trim();
      if (sys) body.system = sys;

      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err?.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      const reply = data.content?.[0]?.text || '（沒有回應）';

      typingEl.classList.remove('typing');
      typingEl.querySelector('.msg-body').textContent = reply;
      history.push({ role: 'assistant', content: reply });

    } catch (err) {
      typingEl.classList.remove('typing');
      typingEl.querySelector('.msg-body').textContent = `⚠ 錯誤：${err.message}`;
    }

    isLoading = false;
    sendBtn.disabled = false;
    userInput.focus();
    scrollBottom();
  }

  function appendMsg(role, text, isTyping = false) {
    const wrapper = document.createElement('div');
    wrapper.style.display = 'flex';
    wrapper.style.flexDirection = 'column';
    wrapper.style.alignItems = role === 'user' ? 'flex-end' : 'flex-start';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? '你' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = `msg ${role}${isTyping ? ' typing' : ''}`;

    const body = document.createElement('span');
    body.className = 'msg-body';
    body.textContent = text;

    bubble.appendChild(body);
    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    messages.appendChild(wrapper);
    scrollBottom();
    return bubble;
  }

  function scrollBottom() {
    messages.scrollTop = messages.scrollHeight;
  }
</script>
</body>
</html>
