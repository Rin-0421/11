<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RP Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0b12;
  --surface: #1a1525;
  --surface2: #221c30;
  --border: #2d2540;
  --accent: #b388ff;
  --accent-dim: #7c4dff;
  --text: #e8e0f0;
  --text-dim: #9b8cb0;
  --user-bubble: #2d2048;
  --ai-bubble: #1a1525;
  --danger: #f87171;
  --green: #86efac;
  --think-bg: #16112a;
  --think-border: #3d2e6b;
}
body {
  font-family: -apple-system,'Segoe UI',system-ui,sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Common */
.finput {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 9px 12px;
  border-radius: 10px; outline: none; font-family: inherit;
  margin-bottom: 10px; transition: border-color .15s;
}
.finput:focus { border-color: var(--accent); }
.finput::placeholder { color: var(--text-dim); opacity: .65; }
.ftextarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 9px 12px;
  border-radius: 10px; outline: none; font-family: inherit;
  resize: vertical; line-height: 1.55; transition: border-color .15s;
}
.ftextarea:focus { border-color: var(--accent); }
.ftextarea::placeholder { color: var(--text-dim); opacity: .65; }
.lbl { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: block; }
.btn-primary {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent-dim), #5e008f);
  color: #fff; border: none; border-radius: 11px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.btn-sm {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12px; padding: 5px 11px;
  border-radius: 7px; cursor: pointer; transition: border-color .15s, color .15s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger {
  width: 100%; padding: 11px; background: none;
  border: 1px solid var(--danger); color: var(--danger);
  border-radius: 10px; font-size: 14px; cursor: pointer;
  margin-top: 10px; transition: background .15s;
}
.btn-danger:hover { background: rgba(248,113,113,.1); }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px; width: 100%; max-width: 500px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--accent); margin-bottom: 13px; font-weight: 600;
}
.fselect {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 6px 10px;
  border-radius: 8px; outline: none; cursor: pointer;
}
.fselect:focus { border-color: var(--accent); }
.err { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; max-width: 500px; width: 100%; }

/* Avatar */
.av-circle {
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--surface2); border: 2px solid var(--border);
  overflow: hidden; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; transition: border-color .15s; font-size: 22px;
}
.av-circle:hover { border-color: var(--accent); }
.av-circle img { width: 100%; height: 100%; object-fit: cover; }
.av-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.av-info p { font-size: 13px; color: var(--text-dim); margin-bottom: 7px; }

/* Doc list */
.doc-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.doc-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.doc-item-name { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-item-count { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.doc-rm-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; padding: 0 2px; transition: color .15s; flex-shrink: 0; }
.doc-rm-btn:hover { color: var(--danger); }
.add-doc-form { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 12px; }
.add-doc-row { display: flex; gap: 7px; margin-bottom: 7px; }
.add-doc-row .finput { margin-bottom: 0; flex: 1; }

/* Setup */
#setup {
  flex: 1; overflow-y: auto; padding: 28px 18px 48px;
  display: flex; flex-direction: column; align-items: center;
}
.setup-hdr { text-align: center; margin-bottom: 22px; }
.setup-hdr h1 {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(135deg, #b388ff, #e040fb);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.setup-hdr p { color: var(--text-dim); font-size: 13px; }

/* ── CHAT LAYOUT ── */
#chat { flex: 1; display: none; flex-direction: column; overflow: hidden; position: relative; }

/* Sidebar overlay */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 50;
}
#sidebar-overlay.open { display: block; }

/* Sidebar */
#sidebar {
  position: fixed; top: 0; left: -280px; bottom: 0;
  width: 280px; background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 51; transition: left .25s ease;
  display: flex; flex-direction: column;
}
#sidebar.open { left: 0; }

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 13px; font-weight: 700;
  color: var(--accent); margin-bottom: 10px;
  letter-spacing: .04em;
}
.new-conv-btn {
  width: 100%; padding: 9px;
  background: linear-gradient(135deg, var(--accent-dim), #5e008f);
  color: #fff; border: none; border-radius: 9px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.new-conv-btn:hover { opacity: .88; }

.conv-list { flex: 1; overflow-y: auto; padding: 8px; }

.conv-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 10px; border-radius: 10px;
  cursor: pointer; transition: background .15s;
  margin-bottom: 3px;
}
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface2); border: 1px solid var(--border); }

.conv-name-wrap { flex: 1; overflow: hidden; }
.conv-name {
  font-size: 13px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  outline: none;
}
.conv-name:focus { color: var(--accent); }
.conv-count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.conv-del-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; padding: 3px 4px;
  border-radius: 5px; flex-shrink: 0; opacity: 0;
  transition: opacity .15s, color .15s;
}
.conv-item:hover .conv-del-btn { opacity: 1; }
.conv-del-btn:hover { color: var(--danger); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-footer-btn {
  width: 100%; padding: 9px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 9px; font-size: 12px; cursor: pointer;
  transition: border-color .15s, color .15s; margin-bottom: 6px;
}
.sidebar-footer-btn:last-child { margin-bottom: 0; }
.sidebar-footer-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Chat header */
.chat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.hdr-av {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--surface2); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 17px;
}
.hdr-av img { width: 100%; height: 100%; object-fit: cover; }
.hdr-name { font-size: 15px; font-weight: 600; flex: 1; }
.hdr-btns { display: flex; gap: 6px; align-items: center; }
.hdr-select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px; padding: 4px 7px;
  border-radius: 6px; outline: none; cursor: pointer;
}
.hdr-select:focus { border-color: var(--accent); }
.icon-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; padding: 6px; border-radius: 8px;
  font-size: 16px; display: flex; align-items: center;
  transition: color .15s, background .15s;
}
.icon-btn:hover { color: var(--accent); background: var(--surface2); }
.think-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px; padding: 4px 8px;
  border-radius: 6px; cursor: pointer; transition: all .15s; white-space: nowrap;
}
.think-toggle:hover { border-color: var(--accent); color: var(--accent); }
.think-toggle.on { border-color: var(--accent); color: var(--accent); background: rgba(179,136,255,.12); }

/* Messages */
#messages {
  flex: 1; overflow-y: auto; padding: 14px 13px;
  display: flex; flex-direction: column; gap: 10px;
}
.msg-row { display: flex; align-items: flex-end; gap: 7px; }
.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }
.msg-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.msg-av img { width: 100%; height: 100%; object-fit: cover; }
.msg-col { display: flex; flex-direction: column; max-width: 74%; }
.msg-name { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; padding-left: 2px; }
.bubble {
  padding: 9px 13px; border-radius: 18px;
  font-size: 14px; line-height: 1.6;
  white-space: pre-wrap; word-break: break-word;
}
.msg-row.assistant .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
.msg-row.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
.bubble.typing { color: var(--text-dim); font-style: italic; }
.msg-img { max-width: 180px; max-height: 180px; border-radius: 10px; display: block; margin-bottom: 5px; }
.pdf-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 9px;
  font-size: 12px; color: var(--text-dim); margin-bottom: 5px;
}

/* Thinking */
.thinking-block { margin-bottom: 6px; border: 1px solid var(--think-border); border-radius: 10px; overflow: hidden; background: var(--think-bg); }
.thinking-summary { display: flex; align-items: center; gap: 6px; padding: 7px 11px; cursor: pointer; font-size: 12px; color: var(--accent); user-select: none; list-style: none; }
.thinking-summary::-webkit-details-marker { display: none; }
.thinking-summary::before { content: '▶'; font-size: 9px; transition: transform .15s; display: inline-block; }
details[open] .thinking-summary::before { transform: rotate(90deg); }
.thinking-content { padding: 8px 11px 10px; font-size: 12px; color: var(--text-dim); line-height: 1.6; white-space: pre-wrap; word-break: break-word; border-top: 1px solid var(--think-border); }

.compress-notice {
  text-align: center; font-size: 11px; color: var(--text-dim);
  padding: 6px 12px; margin: 4px 0;
  background: var(--surface2); border-radius: 20px;
  border: 1px solid var(--border); align-self: center;
}

/* Action buttons */
.bubble-actions {
  display: none; gap: 5px; margin-top: 4px;
}
.bubble-actions.show { display: flex; }
.msg-row.user .bubble-actions { justify-content: flex-end; }
.msg-row.assistant .bubble-actions { justify-content: flex-start; padding-left: 2px; }
.action-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px; padding: 3px 9px;
  border-radius: 6px; cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Input */
.input-area { padding: 9px 13px 15px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
#file-preview { display: none; align-items: center; gap: 8px; margin-bottom: 7px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 7px 10px; }
#file-preview img { width: 32px; height: 32px; object-fit: cover; border-radius: 5px; }
.fp-icon { font-size: 22px; }
.fp-name { flex: 1; font-size: 12px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fp-rm { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; transition: color .15s; }
.fp-rm:hover { color: var(--danger); }
.input-row { display: flex; gap: 7px; align-items: flex-end; }
#user-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 10px 13px;
  border-radius: 22px; outline: none; resize: none;
  min-height: 42px; max-height: 130px;
  font-family: inherit; line-height: 1.5; transition: border-color .15s;
}
#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: var(--text-dim); opacity: .65; }
.attach-btn { width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; color: var(--text-dim); transition: border-color .15s, color .15s; }
.attach-btn:hover { border-color: var(--accent); color: var(--accent); }
.send-btn { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-dim), #5e008f); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s, transform .1s; }
.send-btn:hover { opacity: .85; }
.send-btn:active { transform: scale(.92); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.send-btn svg { width: 17px; height: 17px; fill: white; }

/* Settings panel */
#settings-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 100; align-items: flex-end; }
#settings-panel.open { display: flex; }
.settings-sheet { background: var(--surface); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-height: 90dvh; overflow-y: auto; padding: 18px 20px 48px; }
.sh-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.sh-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.sh-sec { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 7px; margin-top: 16px; font-weight: 600; }
.sh-sec:first-of-type { margin-top: 0; }
.io-row { display: flex; gap: 8px; margin-top: 10px; }
.io-row .btn-sm { flex: 1; text-align: center; }
.btn-green { flex: 1; text-align: center; background: none; border: 1px solid var(--green); color: var(--green); font-size: 12px; padding: 5px 11px; border-radius: 7px; cursor: pointer; transition: background .15s; }
.btn-green:hover { background: rgba(134,239,172,.1); }

/* 官端對話選擇 Modal */
#claude-import-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.8); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
#claude-import-modal.open { display: flex; }
.modal-sheet {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 480px;
  max-height: 80dvh; overflow-y: auto; padding: 20px;
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
.conv-select-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.conv-select-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px 12px; cursor: pointer;
  transition: border-color .15s;
}
.conv-select-item:hover { border-color: var(--accent); }
.conv-select-item.selected { border-color: var(--accent); background: var(--surface2); }
.conv-select-name { font-size: 13px; color: var(--text); }
.conv-select-count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.modal-btns { display: flex; gap: 8px; }
.modal-cancel { flex: 1; padding: 10px; background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 9px; font-size: 13px; cursor: pointer; }
.modal-confirm { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--accent-dim), #5e008f); color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-hdr">
    <h1>✦ RP Chat</h1>
    <p>設定你的角色與場景</p>
  </div>
  <div class="card">
    <div class="card-title">API 金鑰</div>
    <label class="lbl">Anthropic（Claude）</label>
    <input class="finput" type="password" id="api-key-input" placeholder="sk-ant-api03-…" autocomplete="off">
    <label class="lbl">DeepSeek（選填）</label>
    <input class="finput" type="password" id="ds-key-input" placeholder="sk-…" autocomplete="off">
  </div>
  <div class="card">
    <div class="card-title">角色設定</div>
    <div class="av-row">
      <div class="av-circle" id="s-av-btn"><span id="s-av-ph">🎭</span><img id="s-av-img" style="display:none"></div>
      <div class="av-info"><p>點擊圓圈上傳角色頭像</p><button class="btn-sm" id="s-av-upload-btn">選擇圖片</button></div>
    </div>
    <input type="file" id="s-av-file" accept="image/*" style="display:none">
    <label class="lbl">角色名稱</label>
    <input class="finput" type="text" id="char-name-input" placeholder="薔薇、艾拉、Claude…">
  </div>
  <div class="card">
    <div class="card-title">角色知識文件</div>
    <div class="doc-list" id="setup-doc-list"></div>
    <div class="add-doc-form">
      <div class="add-doc-row">
        <input class="finput" type="text" id="new-doc-name" placeholder="文件名稱">
        <button class="btn-sm" id="add-doc-btn">＋ 新增</button>
      </div>
      <textarea class="ftextarea" id="new-doc-content" style="min-height:80px" placeholder="貼入文字內容…"></textarea>
    </div>
  </div>
  <div class="card">
    <div class="card-title">自訂指令</div>
    <textarea class="ftextarea" id="inst-input" style="min-height:88px" placeholder="給 AI 的行為規則…"></textarea>
  </div>
  <div class="card">
    <div class="card-title">模型</div>
    <div style="display:flex;align-items:center;justify-content:space-between">
      <label style="font-size:13px;color:var(--text-dim)">使用模型</label>
      <select class="fselect" id="setup-model">
        <optgroup label="── Claude ──">
          <option value="claude-haiku-4-5-20251001">Haiku 4.5（最省）</option>
          <option value="claude-sonnet-4-6" selected>Sonnet 4.6（推薦）</option>
          <option value="claude-opus-4-5">Opus 4.5（省 token）</option>
          <option value="claude-opus-4-6">Opus 4.6（最強）</option>
        </optgroup>
        <optgroup label="── DeepSeek ──">
          <option value="deepseek-v4-flash">V4 Flash（超省）</option>
          <option value="deepseek-v4-pro">V4 Pro（旗艦）</option>
        </optgroup>
      </select>
    </div>
  </div>
  <button class="btn-primary" id="start-btn">開始聊天 →</button>
  <p class="err" id="setup-err">請填入有效的 API 金鑰（sk-ant-…）</p>
</div>

<!-- CHAT -->
<div id="chat">
  <!-- Sidebar overlay -->
  <div id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">✦ RP Chat</div>
      <button class="new-conv-btn" id="new-conv-btn">＋ 新增對話</button>
    </div>
    <div class="conv-list" id="conv-list"></div>
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" id="sb-settings-btn">⚙ 角色與設定</button>
      <button class="sidebar-footer-btn" id="sb-export-btn">📤 匯出目前對話</button>
      <button class="sidebar-footer-btn" id="sb-import-btn">📥 匯入網頁對話</button>
      <button class="sidebar-footer-btn" id="sb-import-claude-btn">📥 匯入官端對話</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
      <input type="file" id="import-claude-file-sb" accept=".json" style="display:none">
    </div>
  </div>

  <!-- Chat header -->
  <div class="chat-header">
    <button class="icon-btn" id="sidebar-btn">☰</button>
    <div class="hdr-av" id="hdr-av"><span id="hdr-av-ph">🎭</span><img id="hdr-av-img" style="display:none"></div>

<script>
// ── State ──
const SK = 'rp_v5';
let apiKey = '', dsKey = '', charName = '', avatarB64 = '', docs = [], instText = '';
let thinkingEnabled = false;
let conversations = []; // [{ id, name, history }]
let currentConvId = null;
let pendingFile = null, isLoading = false;

const COMPRESS_THRESHOLD = 40;
const KEEP_RECENT = 10;

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function currentConv() { return conversations.find(c => c.id === currentConvId); }
function isDeepSeek(model) { return model.startsWith('deepseek-'); }
function getKey(model) { return isDeepSeek(model) ? dsKey : apiKey; }
function getBaseUrl(model) { return isDeepSeek(model) ? 'https://api.deepseek.com/v1/messages' : 'https://api.anthropic.com/v1/messages'; }

// ── Load ──
try {
  const s = JSON.parse(localStorage.getItem(SK) || 'null');
  if (s && s.apiKey) {
    apiKey = s.apiKey || '';
    dsKey = s.dsKey || '';
    charName = s.charName || '';
    avatarB64 = s.avatarB64 || '';
    docs = s.docs || [];
    instText = s.instText || '';
    thinkingEnabled = s.thinkingEnabled || false;
    conversations = s.conversations || [];
    currentConvId = s.currentConvId || null;
    document.getElementById('chat-model').value = s.model || 'claude-sonnet-4-6';
    // Ensure at least one conversation
    if (!conversations.length) conversations.push({ id: uid(), name: '對話 1', history: [] });
    if (!currentConvId || !conversations.find(c=>c.id===currentConvId))
      currentConvId = conversations[0].id;
    updateThinkBtn();
    showChat();
    renderConvList();
    renderMessages();
  }
} catch(e){}

// ── Save ──
function save() {
  try {
    localStorage.setItem(SK, JSON.stringify({
      apiKey, dsKey, charName, avatarB64, docs, instText, thinkingEnabled,
      conversations, currentConvId,
      model: document.getElementById('chat-model').value
    }));
  } catch(e){ alert('儲存失敗'); }
}

// ── Avatar ──
function setAv(imgId, phId, b64) {
  const img = document.getElementById(imgId), ph = document.getElementById(phId);
  if (b64) { img.src=b64; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='block'; }
}
function bindAv(btnId, uploadId, fileId, imgId, phId) {
  const click = () => document.getElementById(fileId).click();
  document.getElementById(btnId).addEventListener('click', click);
  document.getElementById(uploadId).addEventListener('click', click);
  document.getElementById(fileId).addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    toB64(f).then(b64 => { avatarB64=b64; setAv(imgId,phId,b64); });
  });
}
bindAv('s-av-btn','s-av-upload-btn','s-av-file','s-av-img','s-av-ph');

// ── Thinking ──
function updateThinkBtn() {
  const btn = document.getElementById('think-toggle');
  if (thinkingEnabled) { btn.classList.add('on'); btn.textContent='💭 思考 ON'; }
  else { btn.classList.remove('on'); btn.textContent='💭 思考'; }
}
document.getElementById('think-toggle').addEventListener('click', () => {
  const model = document.getElementById('chat-model').value;
  if (!thinkingEnabled && model==='claude-haiku-4-5-20251001') { alert('延伸思考不支援 Haiku，請先切換模型。'); return; }
  thinkingEnabled = !thinkingEnabled; updateThinkBtn(); save();
});
document.getElementById('chat-model').addEventListener('change', () => {
  if (thinkingEnabled && document.getElementById('chat-model').value==='claude-haiku-4-5-20251001') {
    thinkingEnabled=false; updateThinkBtn(); alert('已自動關閉延伸思考（Haiku 不支援）');
  }
  save();
});

// ── Doc list ──
function renderDocs(listId) {
  const list = document.getElementById(listId);
  list.innerHTML = '';
  if (!docs.length) { list.innerHTML='<p style="font-size:12px;color:var(--text-dim);margin-bottom:6px">尚無文件</p>'; return; }
  docs.forEach((doc, i) => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `<span class="doc-item-name" title="${doc.name}">📄 ${doc.name}</span>
      <span class="doc-item-count">${doc.content.length} 字</span>
      <button class="doc-rm-btn" data-i="${i}">✕</button>`;
    item.querySelector('.doc-rm-btn').addEventListener('click', () => { docs.splice(i,1); renderAllDocs(); save(); });
    list.appendChild(item);
  });
}
function renderAllDocs() { renderDocs('setup-doc-list'); renderDocs('set-doc-list'); }
renderAllDocs();

function addDoc(nameId, contentId) {
  const name = document.getElementById(nameId).value.trim();
  const content = document.getElementById(contentId).value.trim();
  if (!name||!content) { alert('請填入文件名稱和內容'); return; }
  docs.push({ name, content });
  document.getElementById(nameId).value='';
  document.getElementById(contentId).value='';
  renderAllDocs(); save();
}
document.getElementById('add-doc-btn').addEventListener('click', ()=>addDoc('new-doc-name','new-doc-content'));
document.getElementById('set-add-doc-btn').addEventListener('click', ()=>addDoc('set-new-doc-name','set-new-doc-content'));

// ── Start ──
document.getElementById('start-btn').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  const dk = document.getElementById('ds-key-input').value.trim();
  if (!key.startsWith('sk-ant-') && !dk.startsWith('sk-')) {
    document.getElementById('setup-err').style.display='block'; return;
  }
  if (key && !key.startsWith('sk-ant-')) {
    document.getElementById('setup-err').style.display='block'; return;
  }
  document.getElementById('setup-err').style.display='none';
  apiKey=key;
  dsKey=dk;
  charName=document.getElementById('char-name-input').value.trim()||'角色';
  instText=document.getElementById('inst-input').value.trim();
  document.getElementById('chat-model').value=document.getElementById('setup-model').value;
  if (!conversations.length) conversations.push({ id:uid(), name:'對話 1', history:[] });
  currentConvId=conversations[0].id;
  save(); showChat(); renderConvList(); renderMessages();
});

function showChat() {
  document.getElementById('setup').style.display='none';
  document.getElementById('chat').style.display='flex';
  document.getElementById('hdr-name').textContent=charName||'角色';
  setAv('hdr-av-img','hdr-av-ph',avatarB64);
  updateThinkBtn();
  document.getElementById('user-input').focus();
}

// ── Conversation list ──
function renderConvList() {
  const list = document.getElementById('conv-list');
  list.innerHTML='';
  conversations.forEach(conv => {
    const item = document.createElement('div');
    item.className='conv-item'+(conv.id===currentConvId?' active':'');
    const realMsgs = conv.history.filter(m=>!m._notice);
    item.innerHTML=`
      <div class="conv-name-wrap">
        <div class="conv-name" contenteditable="true" spellcheck="false">${escHtml(conv.name)}</div>
        <div class="conv-count">${realMsgs.length} 則訊息</div>
      </div>
      <button class="conv-del-btn" title="刪除">🗑</button>`;

    // Click to switch
    item.addEventListener('click', e => {
      if (e.target.classList.contains('conv-del-btn') || e.target.closest('.conv-name')) return;
      switchConv(conv.id);
    });

    // Rename on blur
    const nameEl = item.querySelector('.conv-name');
    nameEl.addEventListener('blur', () => {
      const newName = nameEl.textContent.trim() || '對話';
      conv.name = newName; save();
    });
    nameEl.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); nameEl.blur(); } });

    // Delete
    item.querySelector('.conv-del-btn').addEventListener('click', e => {
      e.stopPropagation();
      if (conversations.length<=1) { alert('至少保留一個對話'); return; }
      if (!confirm(`確定刪除「${conv.name}」？`)) return;
      const idx = conversations.findIndex(c=>c.id===conv.id);
      conversations.splice(idx,1);
      if (currentConvId===conv.id) {
        currentConvId=conversations[Math.max(0,idx-1)].id;
        renderMessages();
      }
      save(); renderConvList();
    });

    list.appendChild(item);
  });
}

function switchConv(id) {
  currentConvId=id;
  save(); renderConvList(); renderMessages();
  closeSidebar();
}

// ── Sidebar ──
function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
document.getElementById('sidebar-btn').addEventListener('click', openSidebar);
document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

document.getElementById('new-conv-btn').addEventListener('click', () => {
  const num = conversations.length+1;
  const conv = { id:uid(), name:`對話 ${num}`, history:[] };
  conversations.push(conv);
  currentConvId=conv.id;
  save(); renderConvList(); renderMessages(); closeSidebar();
});

document.getElementById('sb-settings-btn').addEventListener('click', () => {
  closeSidebar(); openSettings();
});

document.getElementById('sb-export-btn').addEventListener('click', () => {
  closeSidebar(); exportConv();
});

document.getElementById('sb-import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', e => {
  const f=e.target.files[0]; if(!f) return; e.target.value='';
  doImport(f);
});

// ── Render messages ──
function renderMessages() {
  const conv = currentConv();
  const el = document.getElementById('messages');
  el.innerHTML='';
  if (!conv) return;
  for (let i=0; i<conv.history.length; i++) {
    const msg=conv.history[i];
    if (msg._notice) { addNotice(msg._notice); continue; }
    if (msg.role==='user') {
      const text = typeof msg.content==='string' ? msg.content
        : msg.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      let extra=null;
      if (Array.isArray(msg.content)) {
        const ib=msg.content.find(b=>b.type==='image');
        const db=msg.content.find(b=>b.type==='document');
        if (ib) extra={type:'image',src:`data:${ib.source.media_type};base64,${ib.source.data}`};
        else if (db) extra={type:'pdf',name:'PDF 文件'};
      }
      addBubble('user',text,false,extra,null,i);
    } else {
      const textB=Array.isArray(msg.content)?msg.content.find(b=>b.type==='text')?.text||'':typeof msg.content==='string'?msg.content:'';
      const thinkB=Array.isArray(msg.content)?msg.content.find(b=>b.type==='thinking')?.thinking||null:null;
      addBubble('assistant',textB,false,null,thinkB,i);
    }
  }
  scrollBot();
}

// ── Auto compress ──
async function maybeCompress() {
  const conv = currentConv();
  if (!conv) return;
  const real = conv.history.filter(m=>!m._notice);
  if (real.length < COMPRESS_THRESHOLD) return;
  const toCompress = real.slice(0, real.length-KEEP_RECENT);
  const toKeep = real.slice(real.length-KEEP_RECENT);
  const summaryHistory = toCompress.map(m => ({
    role: m.role,
    content: typeof m.content==='string'?m.content:Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join(''):''
  }));
  try {
    const sys = buildSystem();
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{ 'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true' },
      body: JSON.stringify({
        model: document.getElementById('chat-model').value,
        max_tokens: 1024,
        system: (sys?sys+'\n\n':'')+'你的任務是將以下對話整理成簡潔摘要，保留重要劇情、角色情感狀態和關鍵細節，用第三人稱描述，繁體中文。',
        messages: [...summaryHistory, {role:'user',content:'請將以上對話整理成摘要。'}]
      })
    });
    if (!res.ok) return;
    const data = await res.json();
    const summary = data.content?.[0]?.text||'';
    if (!summary) return;
    conv.history = [
      {_notice:'✦ 對話已自動壓縮，保留最近 10 則完整紀錄'},
      {role:'user',content:`[以下是之前對話的摘要]\n${summary}\n[摘要結束，以下繼續正常對話]`},
      ...toKeep
    ];
    save(); renderConvList();
    document.getElementById('messages').innerHTML='';
    renderMessages();
  } catch(e){ console.error('compress failed',e); }
}

// ── File ──
document.getElementById('attach-btn').addEventListener('click', ()=>document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', e => {
  const f=e.target.files[0]; if(!f) return; e.target.value='';
  const isPdf=f.type==='application/pdf', isImg=f.type.startsWith('image/');
  if(!isPdf&&!isImg) return;
  toB64(f).then(b64=>{
    pendingFile={type:isPdf?'pdf':'image',mime:f.type,data:b64.split(',')[1],src:b64,name:f.name};
    showFP();
  });
});
function showFP() {
  document.getElementById('file-preview').style.display='flex';
  document.getElementById('fp-name').textContent=pendingFile.name;
  if (pendingFile.type==='image') { document.getElementById('fp-img').src=pendingFile.src; document.getElementById('fp-img').style.display='block'; document.getElementById('fp-icon').style.display='none'; }
  else { document.getElementById('fp-img').style.display='none'; document.getElementById('fp-icon').style.display='block'; }
}
document.getElementById('fp-rm').addEventListener('click', ()=>{ pendingFile=null; document.getElementById('file-preview').style.display='none'; });

// ── Input ──
const ui = document.getElementById('user-input');
ui.addEventListener('input', ()=>{ ui.style.height='auto'; ui.style.height=Math.min(ui.scrollHeight,130)+'px'; });
// 手機上 Enter 換行，電腦上 Shift+Enter 換行，Ctrl+Enter 送出
ui.addEventListener('keydown', e=>{
  if(e.key==='Enter'){
    if(e.ctrlKey||e.metaKey){ e.preventDefault(); send(); return; }
    // 讓 Enter 正常換行，不攔截
  }
});
document.getElementById('send-btn').addEventListener('click', send);

function buildSystem() {
  const parts=[];
  if (docs.length) { parts.push('[知識文件]'); docs.forEach(d=>parts.push(`## ${d.name}\n${d.content}`)); }
  if (instText) parts.push('[指令]\n'+instText);
  return parts.join('\n\n');
}

// ── Send ──
async function send() {
  const conv = currentConv();
  if (!conv) return;
  const text = ui.value.trim();
  if ((!text&&!pendingFile)||isLoading) return;
  isLoading=true;
  document.getElementById('send-btn').disabled=true;
  ui.value=''; ui.style.height='auto';

  let content, extra=null;
  if (pendingFile) {
    content=[];
    if (pendingFile.type==='image') { content.push({type:'image',source:{type:'base64',media_type:pendingFile.mime,data:pendingFile.data}}); extra={type:'image',src:pendingFile.src}; }
    else { content.push({type:'document',source:{type:'base64',media_type:pendingFile.mime,data:pendingFile.data}}); extra={type:'pdf',name:pendingFile.name}; }
    if (text) content.push({type:'text',text});
    pendingFile=null; document.getElementById('file-preview').style.display='none';
  } else { content=text; }

  conv.history.push({role:'user',content});
  const userIdx=conv.history.length-1;
  addBubble('user',text,false,extra,null,userIdx);
  const tb=addBubble('assistant','正在輸入…',true,null,null,-1);

  try {
    const model=document.getElementById('chat-model').value;
    const sys=buildSystem();
    const apiMessages=conv.history.filter(m=>!m._notice).map(m=>{
      if (Array.isArray(m.content)) {
        const filtered = m.content.filter(b=>b.type!=='thinking');
        return { ...m, content: filtered.length===1&&filtered[0].type==='text' ? filtered[0].text : filtered };
      }
      return m;
    });

    const useDS = isDeepSeek(model);
    const key = getKey(model);
    if (!key) throw new Error(useDS ? '請先填入 DeepSeek API 金鑰' : '請先填入 Anthropic API 金鑰');

    let body, headers, url;

    if (useDS) {
      // DeepSeek 用 OpenAI 相容格式，system 放在 messages 第一則
      const dsMessages = apiMessages.map(m=>({
        role: m.role,
        content: typeof m.content==='string' ? m.content
          : Array.isArray(m.content) ? m.content.filter(b=>b.type==='text').map(b=>b.text).join('') : ''
      }));
      if (sys) dsMessages.unshift({ role: 'system', content: sys });
      body = { model, max_tokens: 2048, messages: dsMessages };
      headers = { 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` };
      url = 'https://api.deepseek.com/chat/completions';
    } else {
      // Claude 用 Anthropic 格式 + Prompt Caching
      const cachedMessages = apiMessages.map((m, i) => {
        if (i < apiMessages.length - 2) {
          const content = typeof m.content === 'string'
            ? [{ type: 'text', text: m.content, cache_control: { type: 'ephemeral' } }]
            : Array.isArray(m.content)
              ? [...m.content.slice(0,-1), { ...m.content[m.content.length-1], cache_control: { type: 'ephemeral' } }]
              : m.content;
          return { ...m, content };
        }
        return m;
      });
      body = { model, max_tokens: thinkingEnabled?16000:2048, messages: cachedMessages };
      if (sys) body.system = [{ type:'text', text:sys, cache_control:{ type:'ephemeral' } }];
      if (thinkingEnabled) body.thinking = { type:'enabled', budget_tokens:10000 };
      headers = { 'Content-Type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' };
      url = 'https://api.anthropic.com/v1/messages';
    }

    const res=await fetch(url,{ method:'POST', headers, body:JSON.stringify(body) });
    if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err?.error?.message||`HTTP ${res.status}`); }
    const data=await res.json();

    let reply, thinkingText=null;
    if (useDS) {
      reply = data.choices?.[0]?.message?.content || '（沒有回應）';
      // DeepSeek 思考內容在 reasoning_content
      thinkingText = data.choices?.[0]?.message?.reasoning_content || null;
    } else {
      const thinkBlock=data.content?.find(b=>b.type==='thinking');
      const textBlock=data.content?.find(b=>b.type==='text');
      thinkingText=thinkBlock?.thinking||null;
      reply=textBlock?.text||'（沒有回應）';
    }

    tb.querySelector('.bubble').classList.remove('typing');
    tb.querySelector('.bt').textContent=reply;
    if (thinkingText) {
      const thinkEl=document.createElement('details');
      thinkEl.className='thinking-block';
      thinkEl.innerHTML=`<summary class="thinking-summary">思考過程</summary><div class="thinking-content">${escHtml(thinkingText)}</div>`;
      tb.querySelector('.msg-col').insertBefore(thinkEl,tb.querySelector('.bubble'));
    }
    conv.history.push({role:'assistant',content:thinkingText?[{type:'thinking',thinking:thinkingText},{type:'text',text:reply}]:reply});
    const newIdx=conv.history.length-1;
    const actions=document.createElement('div'); actions.className='bubble-actions show';
    const regenBtn=document.createElement('button'); regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
    regenBtn.addEventListener('click', ()=>regenerateFrom(newIdx));
    actions.appendChild(regenBtn);
    tb.querySelector('.msg-col').appendChild(actions);
    save(); renderConvList();
    await maybeCompress();
  } catch(e) {
    tb.querySelector('.bubble').classList.remove('typing');
    tb.querySelector('.bt').textContent='⚠ 錯誤：'+e.message;
    conv.history.pop();
  }

  isLoading=false;
  document.getElementById('send-btn').disabled=false;
  ui.focus(); scrollBot();
}

// ── Bubble ──
function addBubble(role,text,typing,extra,thinkingText,historyIdx) {
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');
  row.className=`msg-row ${role}`;
  if (role==='assistant') {
    const av=document.createElement('div'); av.className='msg-av';
    if (avatarB64) { const i=document.createElement('img'); i.src=avatarB64; av.appendChild(i); } else av.textContent='🎭';
    row.appendChild(av);
  }
  const col=document.createElement('div'); col.className='msg-col';
  if (role==='assistant') { const nm=document.createElement('div'); nm.className='msg-name'; nm.textContent=charName||'角色'; col.appendChild(nm); }
  if (thinkingText) {
    const thinkEl=document.createElement('details'); thinkEl.className='thinking-block';
    thinkEl.innerHTML=`<summary class="thinking-summary">思考過程</summary><div class="thinking-content">${escHtml(thinkingText)}</div>`;
    col.appendChild(thinkEl);
  }
  const bbl=document.createElement('div'); bbl.className='bubble'+(typing?' typing':'');
  if (extra) {
    if (extra.type==='image') { const img=document.createElement('img'); img.src=extra.src; img.className='msg-img'; bbl.appendChild(img); }
    else if (extra.type==='pdf') { const bd=document.createElement('div'); bd.className='pdf-badge'; bd.innerHTML=`📄 ${extra.name}`; bbl.appendChild(bd); }
  }
  const sp=document.createElement('span'); sp.className='bt'; sp.textContent=text;
  bbl.appendChild(sp); col.appendChild(bbl);

  // Action buttons
  if (!typing && historyIdx >= 0) {
    const actions=document.createElement('div');
    actions.className='bubble-actions';
    if (role==='user') {
      const editBtn=document.createElement('button');
      editBtn.className='action-btn'; editBtn.textContent='✏ 編輯';
      editBtn.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); editMessage(historyIdx); });
      actions.appendChild(editBtn);
      // Toggle on bubble click
      bbl.style.cursor='pointer';
      bbl.addEventListener('click', e=>{ e.stopPropagation(); actions.classList.toggle('show'); });
    } else {
      const regenBtn=document.createElement('button');
      regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
      regenBtn.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); regenerateFrom(historyIdx); });
      actions.appendChild(regenBtn);
      actions.classList.add('show');
    }
    col.appendChild(actions);
  }

  row.appendChild(col); msgs.appendChild(row);
  scrollBot(); return row;
}

// ── Edit message ──
function editMessage(historyIdx) {
  const conv=currentConv(); if (!conv||isLoading) return;
  const msg=conv.history[historyIdx];
  const text=typeof msg.content==='string'?msg.content
    :Array.isArray(msg.content)?msg.content.filter(b=>b.type==='text').map(b=>b.text).join(''):'';
  conv.history=conv.history.slice(0,historyIdx);
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  renderMessages();
  // 重繪完再設 input，確保 focus 正確
  setTimeout(()=>{
    ui.value=text;
    ui.style.height='auto';
    ui.style.height=Math.min(ui.scrollHeight,130)+'px';
    ui.focus();
    // 把游標移到最後
    ui.selectionStart=ui.selectionEnd=ui.value.length;
  },0);
}

// ── Regenerate ──
async function regenerateFrom(historyIdx) {
  const conv=currentConv(); if (!conv||isLoading) return;
  // Remove this assistant message and everything after
  conv.history=conv.history.slice(0,historyIdx);
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  renderMessages();

  isLoading=true;
  document.getElementById('send-btn').disabled=true;
  const tb=addBubble('assistant','正在輸入…',true,null,null,-1);

  try {
    const model=document.getElementById('chat-model').value;
    const sys=buildSystem();
    const apiMessages=conv.history.filter(m=>!m._notice).map(m=>{
      if (Array.isArray(m.content)) {
        const filtered=m.content.filter(b=>b.type!=='thinking');
        return {...m,content:filtered.length===1&&filtered[0].type==='text'?filtered[0].text:filtered};
      }
      return m;
    });

    const useDS=isDeepSeek(model);
    const key=getKey(model);
    if (!key) throw new Error(useDS?'請先填入 DeepSeek API 金鑰':'請先填入 Anthropic API 金鑰');

    let body, headers, url;
    if (useDS) {
      const dsMessages=apiMessages.map(m=>({
        role:m.role,
        content:typeof m.content==='string'?m.content:Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join(''):''
      }));
      if (sys) dsMessages.unshift({ role:'system', content:sys });
      body={model,max_tokens:2048,messages:dsMessages};
      headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
      url='https://api.deepseek.com/chat/completions';
    } else {
      const cachedMessages=apiMessages.map((m,i)=>{
        if (i<apiMessages.length-2) {
          const content=typeof m.content==='string'
            ?[{type:'text',text:m.content,cache_control:{type:'ephemeral'}}]
            :Array.isArray(m.content)
              ?[...m.content.slice(0,-1),{...m.content[m.content.length-1],cache_control:{type:'ephemeral'}}]
              :m.content;
          return {...m,content};
        }
        return m;
      });
      body={model,max_tokens:thinkingEnabled?16000:2048,messages:cachedMessages};
      if (sys) body.system=[{type:'text',text:sys,cache_control:{type:'ephemeral'}}];
      if (thinkingEnabled) body.thinking={type:'enabled',budget_tokens:10000};
      headers={'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
      url='https://api.anthropic.com/v1/messages';
    }

    const res=await fetch(url,{method:'POST',headers,body:JSON.stringify(body)});
    if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err?.error?.message||`HTTP ${res.status}`); }
    const data=await res.json();

    let reply, thinkingText=null;
    if (useDS) {
      reply=data.choices?.[0]?.message?.content||'（沒有回應）';
      thinkingText=data.choices?.[0]?.message?.reasoning_content||null;
    } else {
      const thinkBlock=data.content?.find(b=>b.type==='thinking');
      const textBlock=data.content?.find(b=>b.type==='text');
      thinkingText=thinkBlock?.thinking||null;
      reply=textBlock?.text||'（沒有回應）';
    }

    tb.querySelector('.bubble').classList.remove('typing');
    tb.querySelector('.bt').textContent=reply;
    if (thinkingText) {
      const thinkEl=document.createElement('details'); thinkEl.className='thinking-block';
      thinkEl.innerHTML=`<summary class="thinking-summary">思考過程</summary><div class="thinking-content">${escHtml(thinkingText)}</div>`;
      tb.querySelector('.msg-col').insertBefore(thinkEl,tb.querySelector('.bubble'));
    }
    const assistantContent=thinkingText?[{type:'thinking',thinking:thinkingText},{type:'text',text:reply}]:reply;
    conv.history.push({role:'assistant',content:assistantContent});
    const newIdx=conv.history.length-1;
    const actions=document.createElement('div'); actions.className='bubble-actions show';
    const regenBtn=document.createElement('button'); regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
    regenBtn.addEventListener('click', ()=>regenerateFrom(newIdx));
    actions.appendChild(regenBtn);
    tb.querySelector('.msg-col').appendChild(actions);
    save(); renderConvList();
    await maybeCompress();
  } catch(e) {
    tb.querySelector('.bubble').classList.remove('typing');
    tb.querySelector('.bt').textContent='⚠ 錯誤：'+e.message;
  }

  isLoading=false;
  document.getElementById('send-btn').disabled=false;
  ui.focus(); scrollBot();
}

function addNotice(text) {
  const el=document.createElement('div'); el.className='compress-notice'; el.textContent=text;
  document.getElementById('messages').appendChild(el);
}
function scrollBot() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
function escHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Settings ──
function openSettings() {
  document.getElementById('set-claude-key').value=apiKey;
  document.getElementById('set-ds-key').value=dsKey;
  document.getElementById('set-name').value=charName;
  document.getElementById('set-inst').value=instText;
  setAv('set-av-img','set-av-ph',avatarB64);
  renderAllDocs();
  document.getElementById('settings-panel').classList.add('open');
}
document.getElementById('settings-panel').addEventListener('click', e=>{ if(e.target===document.getElementById('settings-panel')) document.getElementById('settings-panel').classList.remove('open'); });
bindAv('set-av-btn','set-av-upload-btn','set-av-file','set-av-img','set-av-ph');
document.getElementById('set-save-btn').addEventListener('click', ()=>{
  const ck=document.getElementById('set-claude-key').value.trim();
  const dk=document.getElementById('set-ds-key').value.trim();
  if (ck) apiKey=ck;
  if (dk) dsKey=dk;
  charName=document.getElementById('set-name').value.trim()||'角色';
  instText=document.getElementById('set-inst').value.trim();
  document.getElementById('hdr-name').textContent=charName;
  setAv('hdr-av-img','hdr-av-ph',avatarB64);
  save(); document.getElementById('settings-panel').classList.remove('open');
});

// ── Export ──
function exportConv() {
  const conv=currentConv(); if(!conv) return;
  const data=JSON.stringify({convName:conv.name,charName,docs,instText,history:conv.history},null,2);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([data],{type:'application/json'}));
  a.download=`rp-${conv.name}-${Date.now()}.json`; a.click();
}
document.getElementById('export-btn').addEventListener('click', exportConv);

// ── 官端格式匯入 ──
let claudeImportData = null; // 暫存解析後的官端對話列表
let selectedClaudeConvIdx = null;

function openClaudeImportFile(fileInputId) {
  document.getElementById(fileInputId).click();
}

function handleClaudeImportFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const raw = JSON.parse(r.result);
      // 官端格式：通常是陣列，每個元素是一個對話
      // 或者是 { conversations: [...] } 的包裝格式
      let convList = [];
      if (Array.isArray(raw)) {
        convList = raw;
      } else if (raw.conversations && Array.isArray(raw.conversations)) {
        convList = raw.conversations;
      } else {
        throw new Error('無法識別格式');
      }

      // 過濾出有訊息的對話
      claudeImportData = convList.filter(c => {
        const msgs = c.chat_messages || c.messages || [];
        return msgs.length > 0;
      });

      if (!claudeImportData.length) throw new Error('找不到對話內容');

      // 渲染選擇列表
      const list = document.getElementById('conv-select-list');
      list.innerHTML = '';
      selectedClaudeConvIdx = 0;

      claudeImportData.forEach((conv, i) => {
        const msgs = conv.chat_messages || conv.messages || [];
        const name = conv.name || conv.title || `對話 ${i+1}`;
        const item = document.createElement('div');
        item.className = 'conv-select-item' + (i===0?' selected':'');
        item.innerHTML = `<div class="conv-select-name">${escHtml(name)}</div>
          <div class="conv-select-count">${msgs.length} 則訊息</div>`;
        item.addEventListener('click', () => {
          document.querySelectorAll('.conv-select-item').forEach(el=>el.classList.remove('selected'));
          item.classList.add('selected');
          selectedClaudeConvIdx = i;
        });
        list.appendChild(item);
      });

      document.getElementById('claude-import-modal').classList.add('open');
      document.getElementById('settings-panel').classList.remove('open');
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');

    } catch(err) {
      alert('讀取失敗：' + err.message + '\n請確認是 claude.ai 匯出的 JSON 格式');
    }
  };
  r.readAsText(file);
}

function doClaudeImport() {
  if (selectedClaudeConvIdx === null || !claudeImportData) return;
  const conv = claudeImportData[selectedClaudeConvIdx];
  const rawMsgs = conv.chat_messages || conv.messages || [];
  const name = conv.name || conv.title || '官端匯入對話';

  // 轉換格式：官端的 sender 是 'human'/'assistant'，content 可能是字串或陣列
  const converted = rawMsgs.map(m => {
    const role = (m.sender || m.role) === 'human' ? 'user' : 'assistant';
    let content = '';
    if (typeof m.text === 'string') content = m.text;
    else if (typeof m.content === 'string') content = m.content;
    else if (Array.isArray(m.content)) {
      content = m.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    }
    return { role, content };
  }).filter(m => m.content.trim());

  // 只保留最後 40 則
  const kept = converted.slice(-40);

  const newConv = { id: uid(), name, history: kept };
  conversations.push(newConv);
  currentConvId = newConv.id;
  save(); renderConvList(); renderMessages();
  document.getElementById('claude-import-modal').classList.remove('open');
  claudeImportData = null;
  selectedClaudeConvIdx = null;
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('claude-import-modal').classList.remove('open');
  claudeImportData = null;
});
document.getElementById('modal-confirm').addEventListener('click', doClaudeImport);

// 設定面板的官端匯入按鈕
document.getElementById('import-claude-trigger-btn').addEventListener('click', () => {
  document.getElementById('import-claude-file').click();
});
document.getElementById('import-claude-file').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return; e.target.value='';
  handleClaudeImportFile(f);
});

// 側邊欄的官端匯入按鈕
document.getElementById('sb-import-claude-btn').addEventListener('click', () => {
  document.getElementById('import-claude-file-sb').click();
});
document.getElementById('import-claude-file-sb').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return; e.target.value='';
  handleClaudeImportFile(f);
});
  const r=new FileReader();
  r.onload=()=>{
    try {
      const s=JSON.parse(r.result);
      if (!Array.isArray(s.history)) throw new Error('格式錯誤');
      if (!confirm(`匯入「${s.convName||'對話'}」為新的對話窗口？`)) return;
      const conv={id:uid(),name:s.convName||'匯入的對話',history:s.history};
      conversations.push(conv);
      currentConvId=conv.id;
      if (s.charName) charName=s.charName;
      if (s.docs) docs=s.docs;
      if (s.instText) instText=s.instText;
      document.getElementById('hdr-name').textContent=charName;
      renderAllDocs(); save(); renderConvList(); renderMessages();
      document.getElementById('settings-panel').classList.remove('open');
    } catch(err) { alert('匯入失敗：'+err.message); }
  };
  r.readAsText(f);
}
document.getElementById('import-trigger-btn').addEventListener('click', ()=>document.getElementById('import-file2').click());
document.getElementById('import-file2').addEventListener('change', e=>{ const f=e.target.files[0]; if(!f) return; e.target.value=''; doImport(f); });

// ── Clear ──
document.getElementById('clear-btn').addEventListener('click', ()=>{
  if (!confirm('確定要清除目前對話紀錄嗎？')) return;
  const conv=currentConv(); if(conv) conv.history=[];
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  document.getElementById('settings-panel').classList.remove('open');
});

// ── Util ──
function toB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read failed')); r.readAsDataURL(file); });
}
