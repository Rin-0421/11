<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f4ead6" id="theme-color-meta">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='white'/%3E%3C/svg%3E">

  const m={name:"Chat",short_name:"Chat",display:"standalone",start_url:location.href,background_color:"#f4ead6",theme_color:"#f4ead6",icons:[{src:icon,sizes:"any",type:"image/svg+xml",purpose:"any maskable"}]};
  const b=new Blob([JSON.stringify(m)],{type:"application/json"});
  const l=document.createElement("link");l.rel="manifest";l.href=URL.createObjectURL(b);
  document.currentScript.after(l);
})();
</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* 預設：淺米底 + 深棕字（方案 C） */
  --bg: #f4ead6;
  --surface: #ede0c4;
  --surface2: #e0d0aa;
  --border: #d4c4a0;
  --accent: #8b5a2b;
  --accent-dim: #a67840;
  --text: #4a3826;
  --text-dim: #8a7658;
  --user-bubble: #d4b98a;
  --ai-bubble: transparent;
  --danger: #b04a3d;
  --green: #5c8a3a;
  --think-bg: #ede0c4;
  --think-border: #c8b48a;
}
body.dark .think-toggle.on { background: rgba(212,165,116,0.15); }
body.dark {
  /* 深色：深棕底 + 米色字（方案 A） */
  --bg: #1c1613;
  --surface: #2a231d;
  --surface2: #362b23;
  --border: #3a2d24;
  --accent: #d4a574;
  --accent-dim: #b8895a;
  --text: #e8ddc9;
  --text-dim: #a89178;
  --user-bubble: #4a3826;
  --ai-bubble: transparent;
  --danger: #d97b6c;
  --green: #7fb35a;
  --think-bg: #241d18;
  --think-border: #5a4632;
}
body {
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; display: flex; flex-direction: column; overflow: hidden;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Common */
.finput {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 9px 12px;
  border-radius: 10px; outline: none; font-family: inherit;
  margin-bottom: 10px; transition: border-color .15s;
}
.finput:focus { border-color: var(--accent); }
.finput::placeholder { color: var(--text-dim); opacity: .65; }
.ftextarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 9px 12px;
  border-radius: 10px; outline: none; font-family: inherit;
  resize: vertical; line-height: 1.55; transition: border-color .15s;
}
.ftextarea:focus { border-color: var(--accent); }
.ftextarea::placeholder { color: var(--text-dim); opacity: .65; }
.lbl { font-size: 12px; color: var(--text-dim); margin-bottom: 5px; display: block; }
.btn-primary {
  width: 100%; padding: 12px;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  color: #fff; border: none; border-radius: 11px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .88; }
.btn-sm {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 12px; padding: 5px 11px;
  border-radius: 7px; cursor: pointer; transition: border-color .15s, color .15s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger {
  width: 100%; padding: 11px; background: none;
  border: 1px solid var(--danger); color: var(--danger);
  border-radius: 10px; font-size: 14px; cursor: pointer;
  margin-top: 10px; transition: background .15s;
}
.btn-danger:hover { background: rgba(248,113,113,.1); }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 18px; width: 100%; max-width: 500px; margin-bottom: 12px;
}
.card-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
  color: var(--accent); margin-bottom: 13px; font-weight: 600;
}
.fselect {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 13px; padding: 6px 10px;
  border-radius: 8px; outline: none; cursor: pointer;
}
.fselect:focus { border-color: var(--accent); }
.err { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; max-width: 500px; width: 100%; }

/* Avatar */
.av-circle {
  width: 58px; height: 58px; border-radius: 50%;
  background: var(--surface2); border: 2px solid var(--border);
  overflow: hidden; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; transition: border-color .15s; font-size: 22px;
}
.av-circle:hover { border-color: var(--accent); }
.av-circle img { width: 100%; height: 100%; object-fit: cover; }
.av-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
.av-info p { font-size: 13px; color: var(--text-dim); margin-bottom: 7px; }

/* Doc list */
.doc-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
.doc-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 9px 12px;
  display: flex; align-items: center; gap: 8px;
}
.doc-item-name { font-size: 13px; color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.doc-item-count { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.doc-rm-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 15px; padding: 0 2px; transition: color .15s; flex-shrink: 0; }
.doc-rm-btn:hover { color: var(--danger); }
.add-doc-form { border-top: 1px solid var(--border); margin-top: 10px; padding-top: 12px; }
.add-doc-row { display: flex; gap: 7px; margin-bottom: 7px; }
.add-doc-row .finput { margin-bottom: 0; flex: 1; }

/* Setup */
#setup {
  flex: 1; overflow-y: auto; padding: 28px 18px 48px;
  display: flex; flex-direction: column; align-items: center;
}
.setup-hdr { text-align: center; margin-bottom: 22px; }
.setup-hdr h1 {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.setup-hdr p { color: var(--text-dim); font-size: 13px; }


/* ── 底部導覽列 ── */
#bottom-nav {
  display: flex; flex-shrink: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  height: 56px;
  z-index: 40;
}
.nav-btn {
  flex: 1; background: none; border: none; color: var(--text-dim);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px; cursor: pointer; padding: 0; font-family: inherit;
  transition: color .15s;
  border-top: 2px solid transparent;
}
.nav-btn.active { color: var(--accent); border-top-color: var(--accent); }
.nav-btn svg { width: 20px; height: 20px; }
.nav-btn .nav-label { font-size: 10px; }

/* 頁面容器 */
.page { flex: 1; display: none; flex-direction: column; overflow: hidden; position: relative; }
.page.active { display: flex; }

/* 頁面標題（主頁以外） */
.page-hdr {
  padding: 14px 16px 12px; border-bottom: 1px solid var(--border);
  font-size: 16px; font-weight: 600; color: var(--text); flex-shrink: 0;
  background: var(--surface);
}
.page-body { flex: 1; overflow-y: auto; padding: 16px; }

/* ── CHAT LAYOUT ── */
#chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; min-height: 0; }

/* Sidebar overlay */
#sidebar-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.6); z-index: 50;
}
#sidebar-overlay.open { display: block; }

/* Sidebar */
#sidebar {
  position: fixed; top: 0; left: -280px; bottom: 0;
  width: 280px; background: var(--surface);
  border-right: 1px solid var(--border);
  z-index: 51; transition: left .25s ease;
  display: flex; flex-direction: column;
}
#sidebar.open { left: 0; }

.sidebar-header {
  padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-title {
  font-size: 13px; font-weight: 700;
  color: var(--accent); margin-bottom: 10px;
  letter-spacing: .04em;
}
.new-conv-btn {
  width: 100%; padding: 9px;
  background: linear-gradient(135deg, var(--accent-dim), var(--accent));
  color: #fff; border: none; border-radius: 9px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity .15s;
}
.new-conv-btn:hover { opacity: .88; }

.conv-list { flex: 1; overflow-y: auto; padding: 8px; }

.conv-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 10px; border-radius: 10px;
  cursor: pointer; transition: background .15s;
  margin-bottom: 3px;
}
.conv-item:hover { background: var(--surface2); }
.conv-item.active { background: var(--surface2); border: 1px solid var(--border); }

.conv-name-wrap { flex: 1; overflow: hidden; }
.conv-name {
  font-size: 13px; color: var(--text);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  outline: none;
}
.conv-name:focus { color: var(--accent); }
.conv-count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }

.conv-del-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; padding: 3px 4px;
  border-radius: 5px; flex-shrink: 0; opacity: 0;
  transition: opacity .15s, color .15s;
}
.conv-item:hover .conv-del-btn { opacity: 1; }
.conv-del-btn:hover { color: var(--danger); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-footer-btn {
  width: 100%; padding: 9px; background: none;
  border: 1px solid var(--border); color: var(--text-dim);
  border-radius: 9px; font-size: 12px; cursor: pointer;
  transition: border-color .15s, color .15s; margin-bottom: 6px;
}
.sidebar-footer-btn:last-child { margin-bottom: 0; }
.sidebar-footer-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Chat header */
.chat-header {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 12px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.hdr-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.hdr-av img { width: 100%; height: 100%; object-fit: cover; }
.hdr-name { font-size: 13px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hdr-btns { display: flex; gap: 6px; align-items: center; }
.hdr-select {
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px; padding: 4px 7px;
  border-radius: 6px; outline: none; cursor: pointer;
}
.hdr-select:focus { border-color: var(--accent); }
.icon-btn {
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; padding: 6px; border-radius: 8px;
  font-size: 16px; display: flex; align-items: center;
  transition: color .15s, background .15s;
}
.icon-btn:hover { color: var(--accent); background: var(--surface2); }
.think-toggle {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 13px; padding: 3px 6px;
  border-radius: 8px; cursor: pointer; transition: all .2s; white-space: nowrap;
  line-height: 1;
}
.think-toggle:hover { border-color: var(--accent); color: var(--accent); }
.think-toggle.on {
  border-color: var(--accent);
  color: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  background: rgba(139,90,43,0.1);
}

/* Messages */
#messages {
  flex: 1; overflow-y: auto; padding: 14px 13px;
  display: flex; flex-direction: column; gap: 7px;
}
.msg-row { display: flex; align-items: flex-end; gap: 7px; }
.msg-row.user { justify-content: flex-end; }
.msg-row.assistant { justify-content: flex-start; }
.msg-av {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--surface2); overflow: hidden; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 13px;
}
.msg-av img { width: 100%; height: 100%; object-fit: cover; }
.msg-col { display: flex; flex-direction: column; max-width: 74%; }
.msg-name { font-size: 11px; color: var(--text-dim); margin-bottom: 3px; padding-left: 2px; }
.bubble {
  padding: 9px 13px; border-radius: 18px;
  font-size: 15px; line-height: 1.6;
  font-family: Georgia, 'Times New Roman', -apple-system, system-ui, sans-serif;
  /* pre-wrap moved to .bt p */
}
/* Assistant 訊息改為無氣泡（純文字段落樣式） */
.msg-row.assistant .bubble {
  background: none; border: none; padding: 0;
  border-radius: 0;
}
.msg-row.assistant .msg-time {
  padding-left: 2px;
}
.msg-row.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; }
.bubble.typing { color: var(--text-dim); font-style: italic; }
.bt { display: block; }
.bt p { margin: 0; white-space: pre-wrap; word-break: break-word; }
.bt p + p { margin-top: 0.75em; }
.msg-time { font-size: 10px; color: var(--text-dim); opacity: 0.6; margin-top: 5px; display: block; }
.msg-row.user .msg-time { text-align: left; }
.msg-row.assistant .msg-time { text-align: right; }
.msg-img { max-width: 180px; max-height: 180px; border-radius: 10px; display: block; margin-bottom: 5px; }
.msg-img-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; }
.msg-img-grid .msg-img { margin-bottom: 0; max-width: 110px; max-height: 110px; }
.pdf-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 5px 9px;
  font-size: 12px; color: var(--text-dim); margin-bottom: 5px;
}

/* Thinking */
.thinking-block { margin-bottom: 6px; border: 1px solid var(--think-border); border-radius: 10px; overflow: hidden; background: var(--think-bg); }
.thinking-summary { display: flex; align-items: center; gap: 6px; padding: 7px 11px; cursor: pointer; font-size: 12px; color: var(--accent); user-select: none; list-style: none; }
.thinking-summary::-webkit-details-marker { display: none; }
.thinking-summary::before { content: '▶'; font-size: 9px; transition: transform .15s; display: inline-block; }
details[open] .thinking-summary::before { transform: rotate(90deg); }
.thinking-content { padding: 8px 11px 10px; font-size: 13px; color: #c4b4e0; line-height: 1.6; white-space: pre-wrap; word-break: break-word; border-top: 1px solid var(--think-border); }

.compress-notice {
  text-align: center; font-size: 11px; color: var(--text-dim);
  padding: 6px 12px; margin: 4px 0;
  background: var(--surface2); border-radius: 20px;
  border: 1px solid var(--border); align-self: center;
}

/* Action buttons */
.bubble-actions {
  display: none; gap: 5px; margin-top: 4px;
}
.bubble-actions.show { display: flex; }
.msg-row.user .bubble-actions { justify-content: flex-end; }
.msg-row.assistant .bubble-actions { justify-content: flex-start; padding-left: 2px; }
.copy-btn { background:none; border:none; color:var(--text-dim); font-size:11px; cursor:pointer; padding:2px 5px; border-radius:4px; opacity:0.5; transition:opacity .15s; }
.copy-btn:hover { opacity:1; }
.action-btn {
  background: none; border: 1px solid var(--border);
  color: var(--text-dim); font-size: 11px; padding: 3px 9px;
  border-radius: 6px; cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Input */
.input-area { padding: 9px 13px 15px; background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; }
#file-preview { display: none; flex-wrap: wrap; gap: 6px; margin-bottom: 7px; }
.fp-item { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 5px 8px; max-width: 160px; }
.fp-item img { width: 28px; height: 28px; object-fit: cover; border-radius: 5px; flex-shrink: 0; }
.fp-icon { font-size: 18px; flex-shrink: 0; }
.fp-name { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fp-rm { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; flex-shrink: 0; transition: color .15s; }
.fp-rm:hover { color: var(--danger); }
.input-row { display: flex; gap: 7px; align-items: flex-end; }
#user-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  color: var(--text); font-size: 14px; padding: 10px 13px;
  border-radius: 22px; outline: none; resize: none;
  min-height: 42px; max-height: 130px;
  font-family: inherit; line-height: 1.5; transition: border-color .15s;
}
#user-input:focus { border-color: var(--accent); }
#user-input::placeholder { color: var(--text-dim); opacity: .65; }
.attach-btn { width: 40px; height: 40px; background: var(--surface2); border: 1px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; color: var(--text-dim); transition: border-color .15s, color .15s; }
.attach-btn:hover { border-color: var(--accent); color: var(--accent); }
.send-btn { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .15s, transform .1s; }
.send-btn:hover { opacity: .85; }
.send-btn:active { transform: scale(.92); }
.send-btn:disabled { background: var(--border); cursor: not-allowed; }
.send-btn svg { width: 17px; height: 17px; fill: white; }

/* Settings panel */
#settings-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.72); z-index: 100; align-items: flex-end; }
#settings-panel.open { display: flex; }
.settings-sheet { background: var(--surface); border-top: 1px solid var(--border); border-radius: 20px 20px 0 0; width: 100%; max-height: 90dvh; overflow-y: auto; padding: 18px 20px 48px; }
.sh-handle { width: 34px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 18px; }
.sh-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
.sh-sec { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 7px; margin-top: 16px; font-weight: 600; }
.sh-sec:first-of-type { margin-top: 0; }
.io-row { display: flex; gap: 8px; margin-top: 10px; }
.io-row .btn-sm { flex: 1; text-align: center; }
.btn-green { flex: 1; text-align: center; background: none; border: 1px solid var(--green); color: var(--green); font-size: 12px; padding: 5px 11px; border-radius: 7px; cursor: pointer; transition: background .15s; }
.btn-green:hover { background: rgba(134,239,172,.1); }

/* 官端對話選擇 Modal */
#claude-import-modal {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.8); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
#claude-import-modal.open { display: flex; }
.modal-sheet {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; width: 100%; max-width: 480px;
  max-height: 80dvh; overflow-y: auto; padding: 20px;
}
.modal-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-dim); margin-bottom: 14px; }
.conv-select-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
.conv-select-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; padding: 10px 12px; cursor: pointer;
  transition: border-color .15s;
}
.conv-select-item:hover { border-color: var(--accent); }
.conv-select-item.selected { border-color: var(--accent); background: var(--surface2); }
.conv-select-name { font-size: 13px; color: var(--text); }
.conv-select-count { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.modal-btns { display: flex; gap: 8px; }
.modal-cancel { flex: 1; padding: 10px; background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 9px; font-size: 13px; cursor: pointer; }
.modal-confirm { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--accent-dim), var(--accent)); color: #fff; border: none; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<script>
// ── State ──
const SK = 'rp_v5';
let apiKey = '', dsKey = '', oaiKey = '', charName = '', avatarB64 = '', docs = [], instText = '';
let thinkingEnabled = false;
let searchEnabled = false;
let conversations = []; // [{ id, name, history }]
let currentConvId = null;
let pendingFiles = [], isLoading = false, abortCtrl = null, darkMode = false;

const COMPRESS_THRESHOLD = 40;
const KEEP_RECENT = 10;

// ── Helpers ──
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function currentConv() { return conversations.find(c => c.id === currentConvId); }
function isDeepSeek(model) { return model.startsWith('deepseek-'); }
function isOpenAI(model) { return model.startsWith('gpt-') || model.startsWith('o1') || model.startsWith('o3'); }
function getKey(model) {
  if (isDeepSeek(model)) return dsKey;
  if (isOpenAI(model)) return oaiKey;
  return apiKey;
}
function getApiUrl(model) {
  if (isDeepSeek(model)) return 'https://api.deepseek.com/chat/completions';
  if (isOpenAI(model)) return 'https://api.openai.com/v1/chat/completions';
  return 'https://api.anthropic.com/v1/messages';
}

// ── IndexedDB 工具 ──
const IDB_NAME = 'rp_chat_db', IDB_STORE = 'kv', IDB_VER = 1;
function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains(IDB_STORE)) req.result.createObjectStore(IDB_STORE); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGet(key) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbSet(key, value) {
  const db = await idbOpen();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

// ── Load（含舊版 localStorage 資料自動搬遷）──
async function loadState() {
  try {
    let s = await idbGet(SK);
    if (!s) {
      // 嘗試從舊版 localStorage 搬遷
      const old = localStorage.getItem(SK);
      if (old) {
        s = JSON.parse(old);
        await idbSet(SK, s);
        localStorage.removeItem(SK);
      }
    }
    if (s) {
      apiKey = s.apiKey || '';
      dsKey = s.dsKey || '';
      oaiKey = s.oaiKey || '';
      charName = s.charName || '';
      avatarB64 = s.avatarB64 || '';
      docs = s.docs || [];
      instText = s.instText || '';
      thinkingEnabled = s.thinkingEnabled || false;
      searchEnabled = s.searchEnabled || false;
      darkMode = !!s.darkMode;
      applyDarkMode();
      conversations = s.conversations || [];
      currentConvId = s.currentConvId || null;
      const savedModel = s.model || 'claude-sonnet-4-6';
      const modelEl = document.getElementById('chat-model');
      if (modelEl) modelEl.value = savedModel;
    }
    if (!conversations.length) conversations.push({ id: uid(), name: '對話 1', history: [] });
    if (!currentConvId || !conversations.find(c=>c.id===currentConvId))
      currentConvId = conversations[0].id;
    initHome();
    renderConvList();
    renderMessages();
  } catch(e) { console.error('load failed', e); }
}
loadState();

// ── Save ──
async function save() {
  try {
    await idbSet(SK, {
      apiKey, dsKey, oaiKey, charName, avatarB64, docs, instText, thinkingEnabled, searchEnabled,
      conversations, currentConvId,
      model: document.getElementById('chat-model').value
    });
  } catch(e){ console.error('save failed', e); alert('儲存失敗'); }
}

// ── Avatar ──
function setAv(imgId, phId, b64) {
  const img = document.getElementById(imgId), ph = document.getElementById(phId);
  if (b64) { img.src=b64; img.style.display='block'; ph.style.display='none'; }
  else { img.style.display='none'; ph.style.display='block'; }
}
function bindAv(btnId, uploadId, fileId, imgId, phId) {
  const btn = document.getElementById(btnId);
  const upload = document.getElementById(uploadId);
  const file = document.getElementById(fileId);
  if (!btn || !upload || !file) return;
  const click = () => file.click();
  btn.addEventListener('click', click);
  upload.addEventListener('click', click);
  file.addEventListener('change', e => {
    const f = e.target.files[0]; if (!f) return;
    toB64(f).then(b64 => { avatarB64=b64; setAv(imgId,phId,b64); });
  });
}

// ── Thinking ──
function updateThinkBtn() {
  const btn = document.getElementById('think-toggle');
  if (thinkingEnabled) btn.classList.add('on');
  else btn.classList.remove('on');
}

function updateSearchBtn() {
  const btn = document.getElementById('search-toggle');
  if (searchEnabled) btn.classList.add('on');
  else btn.classList.remove('on');
}

document.getElementById('search-toggle').addEventListener('click', () => {
  const model = document.getElementById('chat-model').value;
  if (!searchEnabled && isDeepSeek(model)) {
    alert('DeepSeek 不支援搜尋功能。'); return;
  }
  searchEnabled = !searchEnabled;
  updateSearchBtn(); save();
});
document.getElementById('think-toggle').addEventListener('click', () => {
  const model = document.getElementById('chat-model').value;
  if (!thinkingEnabled && (model==='claude-haiku-4-5-20251001' || isOpenAI(model))) {
    alert(isOpenAI(model) ? 'OpenAI 模型不支援延伸思考。' : '延伸思考不支援 Haiku，請先切換模型。'); return;
  }
  thinkingEnabled = !thinkingEnabled; updateThinkBtn(); save();
});
document.getElementById('chat-model').addEventListener('change', () => {
  const model = document.getElementById('chat-model').value;
  if (thinkingEnabled && (model==='claude-haiku-4-5-20251001' || isOpenAI(model))) {
    thinkingEnabled=false; updateThinkBtn();
    alert(isOpenAI(model) ? '已自動關閉延伸思考（OpenAI 不支援）' : '已自動關閉延伸思考（Haiku 不支援）');
  }
  if (searchEnabled && isDeepSeek(model)) {
    searchEnabled=false; updateSearchBtn();
    alert('已自動關閉搜尋（DeepSeek 不支援）');
  }

function renderMessages() {
  const conv = currentConv();
  const el = document.getElementById('messages');
  el.innerHTML='';
  if (!conv) return;
  for (let i=0; i<conv.history.length; i++) {
    const msg=conv.history[i];
    if (msg._notice) { addNotice(msg._notice); continue; }
    if (msg.role==='user') {
      const text = typeof msg.content==='string' ? msg.content
        : msg.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      let extra=null;
      if (Array.isArray(msg.content)) {
        const files = msg.content.filter(b=>b.type==='image'||b.type==='document');
        extra = files.map(b => b.type==='image'
          ? {type:'image', src:`data:${b.source.media_type};base64,${b.source.data}`}
          : {type:'pdf', name:'PDF 文件'});
        if (!extra.length) extra=null;
      }
      addBubble('user',text,false,extra,null,i,msg._time);
    } else {
      const textB=Array.isArray(msg.content)?msg.content.find(b=>b.type==='text')?.text||'':typeof msg.content==='string'?msg.content:'';
      const thinkB=Array.isArray(msg.content)?msg.content.find(b=>b.type==='thinking')?.thinking||null:null;
      addBubble('assistant',textB,false,null,thinkB,i,msg._time);
    }
  }
  scrollBot();
}

// ── Auto compress ──
async function maybeCompress() {
  const conv = currentConv();
  if (!conv) return;
  const real = conv.history.filter(m=>!m._notice);
  if (real.length < COMPRESS_THRESHOLD) return;
  const toCompress = real.slice(0, real.length-KEEP_RECENT);
  const toKeep = real.slice(real.length-KEEP_RECENT);
  const summaryHistory = toCompress.map(m => ({
    role: m.role,
    content: typeof m.content==='string'?m.content:Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join(''):''
  }));

  // 建立可用模型選項
  const modal = document.getElementById('summary-modal');
  const sel = document.getElementById('summary-model-select');
  sel.innerHTML = '';
  if (dsKey) sel.add(new Option('DS V4 Pro（推薦）', 'ds-pro'));
  if (apiKey) { sel.add(new Option('Haiku 4.5', 'haiku')); sel.add(new Option('Sonnet 4.6', 'sonnet')); }
  if (oaiKey) sel.add(new Option('GPT-4o 5月版', 'gpt4o'));
  if (!sel.options.length) { console.error('no key available for compression'); return; }

  // 顯示步驟一（選模型）
  document.getElementById('summary-step-select').style.display = '';
  document.getElementById('summary-step-loading').style.display = 'none';
  document.getElementById('summary-step-edit').style.display = 'none';
  modal.style.display = 'flex';

  const COMPRESS_PROMPT = '你的任務是將以下對話整理成簡潔摘要，保留重要劇情、角色情感狀態和關鍵細節，用第三人稱描述，繁體中文。';

  document.getElementById('summary-gen-btn').onclick = async () => {
    const chosen = sel.value;
    document.getElementById('summary-step-select').style.display = 'none';
    document.getElementById('summary-step-loading').style.display = '';

    try {
      let res, summary = '', modelLabel = chosen;
      if (chosen === 'ds-pro') {
        modelLabel = 'DeepSeek Pro';
        res = await fetch('https://api.deepseek.com/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${dsKey}` },
          body: JSON.stringify({ model: 'deepseek-v4-pro', max_tokens: 1024, messages: [
            { role: 'system', content: COMPRESS_PROMPT },
            ...summaryHistory,
            { role: 'user', content: '請將以上對話整理成摘要。' }
          ]})
        });
        const d = await res.json(); summary = d.choices?.[0]?.message?.content || '';
      } else if (chosen === 'haiku' || chosen === 'sonnet') {
        const m = chosen === 'haiku' ? 'claude-haiku-4-5-20251001' : 'claude-sonnet-4-6';
        modelLabel = chosen === 'haiku' ? 'Haiku 4.5' : 'Sonnet 4.6';
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
          body: JSON.stringify({ model: m, max_tokens: 1024, system: COMPRESS_PROMPT, messages: [...summaryHistory, { role: 'user', content: '請將以上對話整理成摘要。' }] })
        });
        const d = await res.json(); summary = d.content?.[0]?.text || '';
      } else if (chosen === 'gpt4o') {
        modelLabel = 'GPT-4o';
        res = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${oaiKey}` },
          body: JSON.stringify({ model: 'gpt-4o-2024-05-13', max_tokens: 1024, messages: [
            { role: 'system', content: COMPRESS_PROMPT },
            ...summaryHistory,
            { role: 'user', content: '請將以上對話整理成摘要。' }
          ]})
        });
        const d = await res.json(); summary = d.choices?.[0]?.message?.content || '';
      }

      if (!summary) { modal.style.display = 'none'; return; }

      // 進入步驟三（編輯）
      document.getElementById('summary-step-loading').style.display = 'none';
      document.getElementById('summary-step-edit').style.display = '';
      const ta = document.getElementById('summary-edit');
      ta.value = summary;

      function applyCompression(finalSummary) {
        modal.style.display = 'none';
        conv.history = [
          { _notice: `✦ 對話已自動壓縮（${modelLabel}），保留最近 10 則完整紀錄` },
          { role: 'user', content: `[以下是之前對話的摘要]\n${finalSummary}\n[摘要結束，以下繼續正常對話]` },
          ...toKeep
        ];
        save(); renderConvList();
        document.getElementById('messages').innerHTML = '';
        renderMessages();
      }

      document.getElementById('summary-confirm').onclick = () => applyCompression(ta.value.trim() || summary);
      document.getElementById('summary-cancel').onclick = () => applyCompression(summary);

    } catch(e) { console.error('compress failed', e); modal.style.display = 'none'; }
  };
}

function buildSystem() {
  const parts=[];
  if (docs.length) { parts.push('[知識文件]'); docs.forEach(d=>parts.push(`## ${d.name}\n${d.content}`)); }
  if (instText) parts.push('[指令]\n'+instText);
  parts.push('每則用戶訊息的開頭包含當前台灣時間，請以該時間為準，不得自行估算或編造時間。');
  return parts.join('\n\n');
}

// ── Send ──
async function send() {
  const conv = currentConv();
  if (!conv) return;
  const text = ui.value.trim();
  if ((!text&&!pendingFiles.length)||isLoading) return;
  isLoading=true;
  abortCtrl = new AbortController();
  document.getElementById('send-btn').disabled=false;
  document.getElementById('send-icon').style.display='none';
  document.getElementById('stop-icon').style.display='';
  ui.value=''; ui.style.height='auto';

  let content, extra=null;
  if (pendingFiles.length) {
    content=[];
    extra=[];
    pendingFiles.forEach(pf=>{
      if (pf.type==='image') { content.push({type:'image',source:{type:'base64',media_type:pf.mime,data:pf.data}}); extra.push({type:'image',src:pf.src}); }
      else { content.push({type:'document',source:{type:'base64',media_type:pf.mime,data:pf.data}}); extra.push({type:'pdf',name:pf.name}); }
    });
    if (text) content.push({type:'text',text});
    pendingFiles=[]; document.getElementById('file-preview').style.display='none'; document.getElementById('file-preview').innerHTML='';
  } else { content=text; }

  const userTime = nowTW();
  conv.history.push({role:'user',content,_time:userTime});
  const userIdx=conv.history.length-1;
  addBubble('user',text,false,extra,null,userIdx,userTime);
  const tb=addBubble('assistant','正在輸入…',true,null,null,-1);

  try {
    const model=document.getElementById('chat-model').value;
    const sys=buildSystem();
    const apiMessages=conv.history.filter(m=>!m._notice).map(m=>{
      if (Array.isArray(m.content)) {
        const filtered = m.content.filter(b=>b.type!=='thinking');
        return { role: m.role, content: filtered.length===1&&filtered[0].type==='text' ? filtered[0].text : filtered };
      }
      return { role: m.role, content: m.content };
    });

    const useDS = isDeepSeek(model);
    const useOAI = isOpenAI(model);
    const key = getKey(model);
    if (!key) throw new Error(useDS ? '請先填入 DeepSeek API 金鑰' : useOAI ? '請先填入 OpenAI API 金鑰' : '請先填入 Anthropic API 金鑰');

    // 在最後一則 user message 注入當前台灣時間（只進 API，不影響 UI 和 history）
    const _apiTwTime = new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei', year:'numeric', month:'long', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false});
    const _lastUserIdx = apiMessages.map(m=>m.role).lastIndexOf('user');
    if (_lastUserIdx >= 0) {
      const _um = apiMessages[_lastUserIdx];
      const _tp = `[當前台灣時間：${_apiTwTime}]\n`;
      if (typeof _um.content === 'string') {
        apiMessages[_lastUserIdx] = { ..._um, content: _tp + _um.content };
      } else if (Array.isArray(_um.content)) {
        const _nc = _um.content.map(b => b.type==='text' ? {...b, text: _tp + b.text} : b);
        if (!_nc.some(b=>b.type==='text')) _nc.unshift({type:'text', text: _tp});
        apiMessages[_lastUserIdx] = { ..._um, content: _nc };
      }
    }

    let body, headers, url;

    if (useDS || useOAI) {
      // DeepSeek / OpenAI 用 OpenAI 相容格式
      const oaiMessages = apiMessages.map(m => {
        const role = m.role;
        if (Array.isArray(m.content)) {
          const parts = [];
          for (const b of m.content) {
            if (b.type === 'text') parts.push({ type: 'text', text: b.text });
            else if (b.type === 'image' && useOAI) {
              parts.push({ type: 'image_url', image_url: { url: `data:${b.source.media_type};base64,${b.source.data}` } });
            }
          }
          return { role, content: parts.length ? parts : m.content.filter(b=>b.type==='text').map(b=>b.text).join('') };
        }
        return { role, content: typeof m.content === 'string' ? m.content : '' };
      });
      if (sys) oaiMessages.unshift({ role: 'system', content: sys });
      body = { model, max_tokens: 2048, messages: oaiMessages };
      if (useOAI && searchEnabled) body.tools = [{ type: 'web_search_preview' }];
      body.stream = true;
      headers = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` };
      url = useDS ? 'https://api.deepseek.com/chat/completions' : 'https://api.openai.com/v1/chat/completions';
    } else {
      // Claude 用 Anthropic 格式，只對 system prompt 做 Prompt Caching
      body = { model, max_tokens: thinkingEnabled?16000:2048, messages: apiMessages };
      if (sys) body.system = [{ type:'text', text:sys, cache_control:{ type:'ephemeral' } }];
      if (thinkingEnabled) body.thinking = model==='claude-opus-4-7' ? { type:'adaptive' } : { type:'enabled', budget_tokens:10000 };
      if (searchEnabled) body.tools = [{ type:'web_search_20250305', name:'web_search' }];
      body.stream = true;
      headers = { 'Content-Type':'application/json', 'x-api-key':key, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true', 'anthropic-beta':'interleaved-thinking-2025-05-14' };
      url = 'https://api.anthropic.com/v1/messages';
    }

    const res=await fetch(url,{ method:'POST', headers, body:JSON.stringify(body), signal:abortCtrl.signal });
    if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err?.error?.message||`HTTP ${res.status}`); }

    // 準備 UI（移除 typing 狀態，建立 streaming 用的 <p>）
    tb.querySelector('.bubble').classList.remove('typing');
    const _btEl = tb.querySelector('.bt');
    _btEl.innerHTML = '<p></p>';
    const _streamP = _btEl.querySelector('p');

    let _thinkEl = null, _thinkContent = null;
    const _setupThink = () => {
      if (!_thinkEl) {
        _thinkEl = document.createElement('details');
        _thinkEl.open = true;
        _thinkEl.className = 'thinking-block';
        _thinkEl.innerHTML = '<summary class="thinking-summary">思考過程</summary><div class="thinking-content"></div>';
        _thinkContent = _thinkEl.querySelector('.thinking-content');
        tb.querySelector('.msg-col').insertBefore(_thinkEl, tb.querySelector('.bubble'));
      }
    };

    const { reply, thinkingText } = await doStream(res, useDS, useOAI,
      (chunk) => { _setupThink(); _thinkContent.textContent += chunk; scrollBot(); },
      (chunk) => { _streamP.textContent += chunk; scrollBot(); }
    );

    if (_thinkEl) _thinkEl.open = false;
    renderBt(_btEl, reply);

    const _bbl = tb.querySelector('.bubble');
    const _asstTime = nowTW();
    if (_bbl && !_bbl.querySelector('.msg-time')) {
      const _tEl = document.createElement('span'); _tEl.className='msg-time'; _tEl.textContent=_asstTime;
      _bbl.appendChild(_tEl);
    }
    conv.history.push({role:'assistant',content:thinkingText?[{type:'thinking',thinking:thinkingText},{type:'text',text:reply}]:reply,_time:_asstTime});
    const newIdx=conv.history.length-1;
    const actions=document.createElement('div'); actions.className='bubble-actions show';

    actions.appendChild(copyBtnS);
    const regenBtn=document.createElement('button'); regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
    regenBtn.addEventListener('click', ()=>regenerateFrom(newIdx));
    actions.appendChild(regenBtn);
    tb.querySelector('.msg-col').appendChild(actions);
    save(); renderConvList();
    await maybeCompress();
  } catch(e) {
    tb.querySelector('.bubble').classList.remove('typing');
    if (e.name === 'AbortError') {
      tb.remove(); conv.history.pop();
    } else {
      tb.querySelector('.bt').textContent='⚠ 錯誤：'+e.message;
      conv.history.pop();
    }
  }

  isLoading=false; abortCtrl=null;
  document.getElementById('send-icon').style.display='';
  document.getElementById('stop-icon').style.display='none';
  document.getElementById('send-btn').disabled=false;
  ui.focus(); scrollBot();
}

// ── Bubble ──
function nowTW() { return new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei', year:'numeric', month:'long', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false}); }
function renderBt(el, text) {
  const _esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  el.innerHTML = text.split(/\n\n+/).map(p => '<p>' + _esc(p).replace(/\n/g,'<br>') + '</p>').join('');
}
function addBubble(role,text,typing,extra,thinkingText,historyIdx,msgTime) {
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');
  row.className=`msg-row ${role}`;
  if (role==='assistant') {
    const av=document.createElement('div'); av.className='msg-av';
    if (avatarB64) { const i=document.createElement('img'); i.src=avatarB64; av.appendChild(i); } else av.textContent='🎭';
    row.appendChild(av);
  }
  const col=document.createElement('div'); col.className='msg-col';
  if (role==='assistant') { const nm=document.createElement('div'); nm.className='msg-name'; nm.textContent=charName||'角色'; col.appendChild(nm); }
  if (thinkingText) {
    const thinkEl=document.createElement('details'); thinkEl.className='thinking-block';
    thinkEl.innerHTML=`<summary class="thinking-summary">思考過程</summary><div class="thinking-content">${escHtml(thinkingText)}</div>`;
    col.appendChild(thinkEl);
  }
  const bbl=document.createElement('div'); bbl.className='bubble'+(typing?' typing':'');
  if (extra) {
    const extras = Array.isArray(extra) ? extra : [extra];
    if (extras.some(x=>x.type==='image')) {
      const grid=document.createElement('div'); grid.className='msg-img-grid';
      extras.filter(x=>x.type==='image').forEach(x=>{ const img=document.createElement('img'); img.src=x.src; img.className='msg-img'; grid.appendChild(img); });
      bbl.appendChild(grid);
    }
    extras.filter(x=>x.type==='pdf').forEach(x=>{ const bd=document.createElement('div'); bd.className='pdf-badge'; bd.innerHTML=`📄 ${x.name}`; bbl.appendChild(bd); });
  }
  const sp=document.createElement('span'); sp.className='bt';
  if (!typing) renderBt(sp, text);
  bbl.appendChild(sp);
  if (!typing) {
    const _tEl = document.createElement('span'); _tEl.className='msg-time';
    _tEl.textContent = msgTime || nowTW();
    bbl.appendChild(_tEl);
  }
  col.appendChild(bbl);

  // Action buttons
  if (!typing && historyIdx >= 0) {
    const actions=document.createElement('div');
    actions.className='bubble-actions';
    if (role==='user') {
      const copyBtn=document.createElement('button');
      copyBtn.className='action-btn'; copyBtn.textContent='複製';
      copyBtn.addEventListener('click', e=>{ e.stopPropagation(); navigator.clipboard.writeText(text).then(()=>{ copyBtn.textContent='✓'; setTimeout(()=>copyBtn.textContent='複製',1200); }); });
      actions.appendChild(copyBtn);
      const editBtn=document.createElement('button');
      editBtn.className='action-btn'; editBtn.textContent='✏ 編輯';
      editBtn.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); editMessage(historyIdx); });
      actions.appendChild(editBtn);
      // Toggle on bubble click
      bbl.style.cursor='pointer';
      bbl.addEventListener('click', e=>{ e.stopPropagation(); actions.classList.toggle('show'); });
    } else {
      const copyBtn2=document.createElement('button');
      copyBtn2.className='action-btn'; copyBtn2.textContent='複製';
      copyBtn2.addEventListener('click', e=>{ e.stopPropagation(); navigator.clipboard.writeText(text).then(()=>{ copyBtn2.textContent='✓'; setTimeout(()=>copyBtn2.textContent='複製',1200); }); });
      actions.appendChild(copyBtn2);
      const regenBtn=document.createElement('button');
      regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
      regenBtn.addEventListener('click', e=>{ e.preventDefault(); e.stopPropagation(); regenerateFrom(historyIdx); });
      actions.appendChild(regenBtn);
      actions.classList.add('show');
    }
    col.appendChild(actions);
  }

  row.appendChild(col); msgs.appendChild(row);
  scrollBot(); return row;
}

// ── Edit message ──
function editMessage(historyIdx) {
  const conv=currentConv(); if (!conv||isLoading) return;
  const msg=conv.history[historyIdx];
  const text=typeof msg.content==='string'?msg.content
    :Array.isArray(msg.content)?msg.content.filter(b=>b.type==='text').map(b=>b.text).join(''):'';
  conv.history=conv.history.slice(0,historyIdx);
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  renderMessages();
  // 重繪完再設 input，確保 focus 正確
  setTimeout(()=>{
    ui.value=text;
    ui.style.height='auto';
    ui.style.height=Math.min(ui.scrollHeight,130)+'px';
    ui.focus();
    // 把游標移到最後
    ui.selectionStart=ui.selectionEnd=ui.value.length;
  },0);
}

// ── Regenerate ──
async function regenerateFrom(historyIdx) {
  const conv=currentConv(); if (!conv||isLoading) return;
  // Remove this assistant message and everything after
  conv.history=conv.history.slice(0,historyIdx);
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  renderMessages();

  isLoading=true;
  abortCtrl=new AbortController();
  document.getElementById('send-btn').disabled=false;
  document.getElementById('send-icon').style.display='none';
  document.getElementById('stop-icon').style.display='';
  const tb=addBubble('assistant','正在輸入…',true,null,null,-1);

  try {
    const model=document.getElementById('chat-model').value;
    const sys=buildSystem();
    const apiMessages=conv.history.filter(m=>!m._notice).map(m=>{
      if (Array.isArray(m.content)) {
        const filtered=m.content.filter(b=>b.type!=='thinking');
        return {role:m.role,content:filtered.length===1&&filtered[0].type==='text'?filtered[0].text:filtered};
      }
      return {role:m.role,content:m.content};
    });

    const useDS=isDeepSeek(model);
    const useOAI=isOpenAI(model);
    const key=getKey(model);
    if (!key) throw new Error(useDS?'請先填入 DeepSeek API 金鑰':useOAI?'請先填入 OpenAI API 金鑰':'請先填入 Anthropic API 金鑰');

    // 在最後一則 user message 注入當前台灣時間（只進 API，不影響 UI 和 history）
    const _apiTwTime = new Date().toLocaleString('zh-TW', {timeZone:'Asia/Taipei', year:'numeric', month:'long', day:'numeric', weekday:'short', hour:'2-digit', minute:'2-digit', hour12:false});
    const _lastUserIdx = apiMessages.map(m=>m.role).lastIndexOf('user');
    if (_lastUserIdx >= 0) {
      const _um = apiMessages[_lastUserIdx];
      const _tp = `[當前台灣時間：${_apiTwTime}]\n`;
      if (typeof _um.content === 'string') {
        apiMessages[_lastUserIdx] = { ..._um, content: _tp + _um.content };
      } else if (Array.isArray(_um.content)) {
        const _nc = _um.content.map(b => b.type==='text' ? {...b, text: _tp + b.text} : b);
        if (!_nc.some(b=>b.type==='text')) _nc.unshift({type:'text', text: _tp});
        apiMessages[_lastUserIdx] = { ..._um, content: _nc };
      }
    }

    let body, headers, url;
    if (useDS || useOAI) {
      const oaiMessages=apiMessages.map(m=>{
        if (Array.isArray(m.content)) {
          const parts=[];
          for (const b of m.content) {
            if (b.type==='text') parts.push({type:'text',text:b.text});
            else if (b.type==='image'&&useOAI) parts.push({type:'image_url',image_url:{url:`data:${b.source.media_type};base64,${b.source.data}`}});
          }
          return {role:m.role,content:parts.length?parts:m.content.filter(b=>b.type==='text').map(b=>b.text).join('')};
        }
        return {role:m.role,content:typeof m.content==='string'?m.content:''};
      });
      if (sys) oaiMessages.unshift({role:'system',content:sys});
      body={model,max_tokens:2048,messages:oaiMessages};
      if (useOAI && searchEnabled) body.tools=[{type:'web_search_preview'}];
      body.stream=true;
      headers={'Content-Type':'application/json','Authorization':`Bearer ${key}`};
      url=useDS?'https://api.deepseek.com/chat/completions':'https://api.openai.com/v1/chat/completions';
    } else {
      body={model,max_tokens:thinkingEnabled?16000:2048,messages:apiMessages};
      if (sys) body.system=[{type:'text',text:sys,cache_control:{type:'ephemeral'}}];
      if (thinkingEnabled) body.thinking=model==='claude-opus-4-7'?{type:'adaptive'}:{type:'enabled',budget_tokens:10000};
      if (searchEnabled) body.tools=[{type:'web_search_20250305',name:'web_search'}];
      body.stream=true;
      headers={'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true','anthropic-beta':'interleaved-thinking-2025-05-14'};
      url='https://api.anthropic.com/v1/messages';
    }

    const res=await fetch(url,{method:'POST',headers,body:JSON.stringify(body),signal:abortCtrl.signal});
    if (!res.ok) { const err=await res.json().catch(()=>({})); throw new Error(err?.error?.message||`HTTP ${res.status}`); }

    tb.querySelector('.bubble').classList.remove('typing');
    const _btEl = tb.querySelector('.bt');
    _btEl.innerHTML = '<p></p>';
    const _streamP = _btEl.querySelector('p');

    let _thinkEl = null, _thinkContent = null;
    const _setupThink = () => {
      if (!_thinkEl) {
        _thinkEl = document.createElement('details');
        _thinkEl.open = true;
        _thinkEl.className = 'thinking-block';
        _thinkEl.innerHTML = '<summary class="thinking-summary">思考過程</summary><div class="thinking-content"></div>';
        _thinkContent = _thinkEl.querySelector('.thinking-content');
        tb.querySelector('.msg-col').insertBefore(_thinkEl, tb.querySelector('.bubble'));
      }
    };

    const { reply, thinkingText } = await doStream(res, useDS, useOAI,
      (chunk) => { _setupThink(); _thinkContent.textContent += chunk; scrollBot(); },
      (chunk) => { _streamP.textContent += chunk; scrollBot(); }
    );

    if (_thinkEl) _thinkEl.open = false;
    renderBt(_btEl, reply);

    const _bbl = tb.querySelector('.bubble');
    const _asstTime = nowTW();
    if (_bbl && !_bbl.querySelector('.msg-time')) {
      const _tEl = document.createElement('span'); _tEl.className='msg-time'; _tEl.textContent=_asstTime;
      _bbl.appendChild(_tEl);
    }
    const assistantContent=thinkingText?[{type:'thinking',thinking:thinkingText},{type:'text',text:reply}]:reply;
    conv.history.push({role:'assistant',content:assistantContent,_time:_asstTime});
    const newIdx=conv.history.length-1;
    const actions=document.createElement('div'); actions.className='bubble-actions show';
    const copyBtnS=document.createElement('button'); copyBtnS.className='action-btn'; copyBtnS.textContent='複製';
    copyBtnS.addEventListener('click', ()=>{ navigator.clipboard.writeText(reply).then(()=>{ copyBtnS.textContent='✓'; setTimeout(()=>copyBtnS.textContent='複製',1200); }); });
    actions.appendChild(copyBtnS);
    const regenBtn=document.createElement('button'); regenBtn.className='action-btn'; regenBtn.textContent='↺ 重新生成';
    regenBtn.addEventListener('click', ()=>regenerateFrom(newIdx));
    actions.appendChild(regenBtn);
    tb.querySelector('.msg-col').appendChild(actions);
    save(); renderConvList();
    await maybeCompress();
  } catch(e) {
    tb.querySelector('.bubble').classList.remove('typing');
    if (e.name==='AbortError') { tb.remove(); }
    else { tb.querySelector('.bt').textContent='⚠ 錯誤：'+e.message; }
  }

  isLoading=false; abortCtrl=null;
  document.getElementById('send-icon').style.display='';
  document.getElementById('stop-icon').style.display='none';
  document.getElementById('send-btn').disabled=false;
  ui.focus(); scrollBot();
}

function addNotice(text) {
  const el=document.createElement('div'); el.className='compress-notice'; el.textContent=text;
  document.getElementById('messages').appendChild(el);
}
function scrollBot() { const m=document.getElementById('messages'); m.scrollTop=m.scrollHeight; }
async function doStream(res, useDS, useOAI, onThink, onReply) {
  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buf = '', reply = '', thinking = '';
  let claudeBlockType = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (raw === '[DONE]') continue;
      try {
        const d = JSON.parse(raw);
        if (useDS || useOAI) {
          const delta = d.choices?.[0]?.delta;
          if (delta?.reasoning_content) { thinking += delta.reasoning_content; onThink(delta.reasoning_content); }
          if (delta?.content) { reply += delta.content; onReply(delta.content); }
        } else {
          if (d.type === 'content_block_start') claudeBlockType = d.content_block?.type;
          else if (d.type === 'content_block_delta') {
            if (d.delta?.type === 'thinking_delta') { thinking += d.delta.thinking; onThink(d.delta.thinking); }
            else if (d.delta?.type === 'text_delta') { reply += d.delta.text; onReply(d.delta.text); }
          }
        }
      } catch(e) {}
    }
  }
  return { reply: reply || '（沒有回應）', thinkingText: thinking || null };
}

let claudeImportData = null; // 暫存解析後的官端對話列表
let selectedClaudeConvIdx = null;

function openClaudeImportFile(fileInputId) {
  document.getElementById(fileInputId).click();
}

function handleClaudeImportFile(file) {
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const raw = JSON.parse(r.result);
      // 官端格式：通常是陣列，每個元素是一個對話
      // 或者是 { conversations: [...] } 的包裝格式
      let convList = [];
      if (Array.isArray(raw)) {
        convList = raw;
      } else if (raw.conversations && Array.isArray(raw.conversations)) {
        convList = raw.conversations;
      } else {
        throw new Error('無法識別格式');
      }

      // 過濾出有訊息的對話
      claudeImportData = convList.filter(c => {
        const msgs = c.chat_messages || c.messages || [];
        return msgs.length > 0;
      });

      if (!claudeImportData.length) throw new Error('找不到對話內容');

      // 渲染選擇列表
      const list = document.getElementById('conv-select-list');
      list.innerHTML = '';
      selectedClaudeConvIdx = 0;

      claudeImportData.forEach((conv, i) => {
        const msgs = conv.chat_messages || conv.messages || [];
        const name = conv.name || conv.title || `對話 ${i+1}`;
        const item = document.createElement('div');
        item.className = 'conv-select-item' + (i===0?' selected':'');
        item.innerHTML = `<div class="conv-select-name">${escHtml(name)}</div>
          <div class="conv-select-count">${msgs.length} 則訊息</div>`;
        item.addEventListener('click', () => {
          document.querySelectorAll('.conv-select-item').forEach(el=>el.classList.remove('selected'));
          item.classList.add('selected');
          selectedClaudeConvIdx = i;
        });
        list.appendChild(item);
      });

      document.getElementById('claude-import-modal').classList.add('open');
      document.getElementById('settings-panel').classList.remove('open');
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('open');

    } catch(err) {
      alert('讀取失敗：' + err.message + '\n請確認是 claude.ai 匯出的 JSON 格式');
    }
  };
  r.readAsText(file);
}

function doClaudeImport() {
  if (selectedClaudeConvIdx === null || !claudeImportData) return;
  const conv = claudeImportData[selectedClaudeConvIdx];
  const rawMsgs = conv.chat_messages || conv.messages || [];
  const name = conv.name || conv.title || '官端匯入對話';

  // 轉換格式：官端的 sender 是 'human'/'assistant'，content 可能是字串或陣列
  const converted = rawMsgs.map(m => {
    const role = (m.sender || m.role) === 'human' ? 'user' : 'assistant';
    let content = '';
    if (typeof m.text === 'string') content = m.text;
    else if (typeof m.content === 'string') content = m.content;
    else if (Array.isArray(m.content)) {
      content = m.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    }
    return { role, content };
  }).filter(m => m.content.trim());

  // 只保留最後 40 則
  const kept = converted.slice(-40);

  const newConv = { id: uid(), name, history: kept };
  conversations.push(newConv);
  currentConvId = newConv.id;
  save(); renderConvList(); renderMessages();
  document.getElementById('claude-import-modal').classList.remove('open');
  claudeImportData = null;
  selectedClaudeConvIdx = null;
}

// ── 網頁格式匯入 ──
function doImport(f) {
  const r=new FileReader();
  r.onload=()=>{
    try {
      const s=JSON.parse(r.result);
      if (!Array.isArray(s.history)) throw new Error('格式錯誤');
      if (!confirm(`匯入「${s.convName||'對話'}」為新的對話窗口？`)) return;
      const conv={id:uid(),name:s.convName||'匯入的對話',history:s.history};
      conversations.push(conv);
      currentConvId=conv.id;
      if (s.charName) charName=s.charName;
      if (s.docs) docs=s.docs;
      if (s.instText) instText=s.instText;
      document.getElementById('hdr-name').textContent=charName;
      renderAllDocs(); save(); renderConvList(); renderMessages();
      document.getElementById('settings-panel').classList.remove('open');
    } catch(err) { alert('匯入失敗：'+err.message); }
  };
  r.readAsText(f);
}
document.getElementById('import-trigger-btn').addEventListener('click', ()=>document.getElementById('import-file2').click());
document.getElementById('import-file2').addEventListener('change', e=>{ const f=e.target.files[0]; if(!f) return; e.target.value=''; doImport(f); });

// ── Clear ──
document.getElementById('clear-btn').addEventListener('click', ()=>{
  if (!confirm('確定要清除目前對話紀錄嗎？')) return;
  const conv=currentConv(); if(conv) conv.history=[];
  save(); renderConvList();
  document.getElementById('messages').innerHTML='';
  document.getElementById('settings-panel').classList.remove('open');
});

// ── Util ──
function toB64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(new Error('read failed')); r.readAsDataURL(file); });
}

function compressImage(file, maxSize=1024, quality=0.82) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      let w = img.naturalWidth, h = img.naturalHeight;
      if (w <= maxSize && h <= maxSize) {
        // 不需要壓縮，直接轉 b64
        toB64(file).then(resolve);
        return;
      }
      if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
      else { w = Math.round(w * maxSize / h); h = maxSize; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); toB64(file).then(resolve); };
    img.src = url;
  });
}
